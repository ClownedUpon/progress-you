<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Progress You — Notebook System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>html,body{margin:0;padding:0;background:#F8F3EC;}#root{min-height:100vh;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
// ─── Constants ────────────────────────────────────────────────────────────────

const DEFAULT_SECTIONS = [
  { id:"overhead", label:"Overhead / Admin", color:"#7C7166" },
  { id:"work",     label:"Work Journal",     color:"#0C7B7B" },
  { id:"personal", label:"Personal Journal", color:"#B05A12" },
  { id:"thesis",   label:"Thesis Work",      color:"#4B3FC7" },
  { id:"jobs",     label:"Job Search",       color:"#1A7A43" },
  { id:"tech",     label:"Tech Backlog",     color:"#135D99" },
  { id:"books",    label:"Books",            color:"#9B1A55" },
  { id:"new",      label:"New Directions",   color:"#7A4010" },
];

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const PRESET_COLORS = ["#0C7B7B","#4B3FC7","#1A7A43","#135D99","#9B1A55","#B05A12","#7A4010","#7C7166","#C43A3A","#6B5080","#2A7A8A","#7A7A2A","#A0782A","#3A6A7A"];
const EDITOR_FONTS  = [
  { label:"Sans",  value:'"DM Sans", sans-serif'        },
  { label:"Serif", value:'"Playfair Display", serif'    },
  { label:"Lora",  value:'"Lora", serif'                },
  { label:"Mono",  value:'"JetBrains Mono", monospace'  },
];
const EDITOR_SIZES  = [
  { label:"Small", value:"11px" },
  { label:"Body",  value:"13px" },
  { label:"Large", value:"16px" },
  { label:"H2",    value:"20px" },
  { label:"H1",    value:"26px" },
];
const TEXT_COLORS = [
  "#1C1714","#4A3F30","#7A6C5E","#9B8E80",
  "#C43A3A","#B05A12","#7A4010","#1A7A43",
  "#0C7B7B","#135D99","#4B3FC7","#9B1A55",
];

// Bump this number whenever the data schema changes (new fields, renamed keys, etc.)
// so exported files can be versioned and future imports can handle old formats.
const EXPORT_VERSION = 5;

// ─── Helpers ──────────────────────────────────────────────────────────────────

const uid = () => Math.random().toString(36).slice(2,10);

function textFor(hex="#888") {
  if(!hex||hex.length<7) return "#fff";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 0.299*r+0.587*g+0.114*b>145?"#1C1714":"#FFFFFF";
}
function mondayOf(date) {
  const d=new Date(date); d.setHours(12,0,0,0);
  const day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1));
  return [d.getFullYear(),String(d.getMonth()+1).padStart(2,"0"),String(d.getDate()).padStart(2,"0")].join("-");
}
function shiftWeek(wk,n) {
  const [y,m,d]=wk.split("-").map(Number);
  const dt=new Date(y,m-1,d,12,0,0); dt.setDate(dt.getDate()+n*7);
  return mondayOf(dt);
}
function weekLabel(wk) {
  const [y,m,d]=wk.split("-").map(Number);
  const s=new Date(y,m-1,d),e=new Date(y,m-1,d+6);
  const fmt=(dt,yr)=>dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",...(yr?{year:"numeric"}:{})});
  return `${fmt(s)} – ${fmt(e,true)}`;
}
function monthKeyOf(ts) {
  const d=new Date(ts);
  return [d.getFullYear(),String(d.getMonth()+1).padStart(2,"0")].join("-");
}
function fmtMonth(mk) {
  const [y,m]=mk.split("-").map(Number);
  return new Date(y,m-1,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});
}
function blockMins(blk) {
  const [sh,sm]=blk.start.split(":").map(Number);
  const [eh,em]=blk.end.split(":").map(Number);
  return Math.max(0,(eh*60+em)-(sh*60+sm));
}
function todayName()   { return new Date().toLocaleDateString("en-GB",{weekday:"long"}); }
function nowStamp()    { return new Date().toISOString().slice(0,16).replace("T","_").replace(":","-"); }
function todayISO()    { return new Date().toISOString().slice(0,10); }
function addDays(iso,n){ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function fmtDue(iso) {
  const today=todayISO(), diff=Math.round((new Date(iso+"T12:00:00")-new Date(today+"T12:00:00"))/(1000*60*60*24));
  if(diff<0)  return { label:`${Math.abs(diff)}d overdue`, urgent:true };
  if(diff===0)return { label:"Due today", urgent:true };
  if(diff===1)return { label:"Due tomorrow", urgent:false };
  const d=new Date(iso+"T12:00:00");
  return { label:"Due "+d.toLocaleDateString("en-GB",{day:"numeric",month:"short"}), urgent:false };
}

// ─── Note tree helpers ────────────────────────────────────────────────────────

function noteChildren(items,parentId) {
  return items.filter(n=>n.parentId===(parentId||null)).sort((a,b)=>a.order-b.order);
}
function noteDescendants(items,id) {
  const children=items.filter(n=>n.parentId===id);
  return children.flatMap(c=>[c.id,...noteDescendants(items,c.id)]);
}
function makeNote(parentId=null,order=0) {
  return{id:uid(),parentId,title:"Untitled Note",content:"<p><br></p>",order,createdAt:Date.now()};
}

// ─── Storage ──────────────────────────────────────────────────────────────────

async function sget(k) {
  if (!window.__TAURI__?.fs) return null;
  try {
    const { exists, readTextFile, BaseDirectory } = window.__TAURI__.fs;
    const found = await exists(k + ".json", { baseDir: BaseDirectory.AppData });
    if (!found) return null;
    const text = await readTextFile(k + ".json", { baseDir: BaseDirectory.AppData });
    return JSON.parse(text);
  } catch { return null; }
}

async function sset(k, v) {
  if (!window.__TAURI__?.fs) return;
  try {
    const { writeTextFile, BaseDirectory } = window.__TAURI__.fs;
    await writeTextFile(k + ".json", JSON.stringify(v), { baseDir: BaseDirectory.AppData });
  } catch(e) { console.error("sset error:", e); }
}

// ─── Shared styles ────────────────────────────────────────────────────────────

const S = {
  input:    {width:"100%",display:"block",padding:"9px 12px",borderRadius:8,border:"1.5px solid #D6CEC3",background:"#FDFAF6",fontFamily:'"DM Sans",sans-serif',fontSize:13,color:"#1C1714",outline:"none",marginBottom:12},
  btnDark:  {padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",background:"#1C1714",color:"#F8F3EC",fontFamily:'"DM Sans",sans-serif',fontSize:13,fontWeight:600},
  btnGhost: {padding:"8px 16px",borderRadius:8,border:"1.5px solid #C8BEB0",cursor:"pointer",background:"transparent",color:"#6B5E4E",fontFamily:'"DM Sans",sans-serif',fontSize:13,fontWeight:500},
  btnMicro: {padding:"4px 9px",borderRadius:6,border:"none",cursor:"pointer",background:"#EBE4D8",color:"#4A3F30",fontFamily:'"DM Sans",sans-serif',fontSize:11,fontWeight:600},
  lbl:      {display:"block",fontSize:11,fontWeight:700,color:"#7A6C5E",letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:7},
};

// ─── App Root ─────────────────────────────────────────────────────────────────

function App() {
  const [view,      setView]      = useState("today");
  const [week,      setWeek]      = useState(()=>mondayOf(new Date()));
  const [sections,  setSections]  = useState(DEFAULT_SECTIONS);
  const [tt,        setTt]        = useState({});
  const [tasks,     setTasks]     = useState([]);
  const [notes,     setNotes]     = useState({});
  const [ready,     setReady]     = useState(false);
  const [showSett,  setShowSett]  = useState(false);
  const [showIO,    setShowIO]    = useState(false);
  const [showCap,   setShowCap]   = useState(false);
  const [dialog,    setDialog]    = useState(null);
  const [updateInfo,setUpdateInfo]= useState(null);
  const [showUpdate,setShowUpdate]= useState(false);

  useEffect(()=>{
    document.addEventListener('contextmenu', e => e.preventDefault());
    (async()=>{
      try { if(window.__TAURI__?.fs){ const { mkdir, BaseDirectory } = window.__TAURI__.fs; await mkdir(".", { baseDir: BaseDirectory.AppData, recursive: true }); } } catch(e) {}
      const sec=await sget("py-sections");
      const t  =await sget("py-tt");
      const k  =await sget("py-tasks");
      const n  =await sget("py-notes");
      if(sec) setSections(sec);
      if(t)   setTt(t);
      if(k)   setTasks(k);
      if(n)   setNotes(n);
      setReady(true);
      checkForUpdate();
    })();
  },[]);
  useEffect(()=>{ if(ready) sset("py-sections",sections); },[sections,ready]);
  useEffect(()=>{ if(ready) sset("py-tt",tt);             },[tt,ready]);
  useEffect(()=>{ if(ready) sset("py-tasks",tasks);       },[tasks,ready]);
  useEffect(()=>{ if(ready) sset("py-notes",notes);       },[notes,ready]);

  // Global keyboard shortcut: Ctrl/Cmd+Space → Quick Capture
  useEffect(()=>{
    const handler = e => {
      if((e.ctrlKey||e.metaKey) && e.code==="Space") { e.preventDefault(); setShowCap(true); }
    };
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  },[]);

  const byId = Object.fromEntries(sections.map(s=>[s.id,s]));

  // ── Timetable ops
  const getDayBlocks=day=>[...((tt[week]||{})[day]||[])].sort((a,b)=>a.start.localeCompare(b.start));
  function upsertBlock(day,blk){
    setTt(prev=>{
      const w={...(prev[week]||{})},arr=[...(w[day]||[])];
      const i=arr.findIndex(b=>b.id===blk.id);
      if(i>=0) arr[i]=blk; else arr.push(blk);
      return{...prev,[week]:{...w,[day]:arr}};
    });
  }
  function deleteBlock(day,id){
    setTt(prev=>{const w={...(prev[week]||{})};return{...prev,[week]:{...w,[day]:(w[day]||[]).filter(b=>b.id!==id)}};});
  }
  function copyPrevWeek(){
    const prev=shiftWeek(week,-1);
    if(!tt[prev]) { setDialog({message:"No timetable data found for last week.",onClose:()=>setDialog(null)}); return; }
    setDialog({
      message:"Copy last week's timetable?",
      detail:"This will replace any blocks already added for this week.",
      confirmLabel:"Copy",
      onConfirm:()=>{ setTt(p=>({...p,[week]:JSON.parse(JSON.stringify(tt[prev]))})); setDialog(null); },
      onClose:()=>setDialog(null)
    });
  }

  // ── Task ops
  function addTask(sid,title,notesT,extra={}){
    setTasks(p=>[{
      id:uid(),sectionId:sid,title,notes:notesT,
      type:extra.type||"task",status:extra.status||"backlog",
      dueDate:extra.dueDate||null,
      createdAt:Date.now(),completedAt:null,monthCompleted:null
    },...p]);
  }
  function updateTask(id,upd){ setTasks(p=>p.map(t=>t.id===id?{...t,...upd}:t)); }
  function deleteTask(id)    { setTasks(p=>p.filter(t=>t.id!==id)); }
  function completeTask(id)  { const now=Date.now(); updateTask(id,{status:"done",completedAt:now,monthCompleted:monthKeyOf(now)}); }
  function moveTask(dragId,beforeId,newStatus){
    setTasks(prev=>{
      const dragged=prev.find(t=>t.id===dragId); if(!dragged) return prev;
      const arr=prev.filter(t=>t.id!==dragId);
      const updated={...dragged,status:newStatus};
      if(beforeId){const idx=arr.findIndex(t=>t.id===beforeId);arr.splice(idx>=0?idx:arr.length,0,updated);}
      else arr.push(updated);
      return arr;
    });
  }

  // ── Notes ops
  const getSectionNotes=sid=>{ const val=notes[sid]; return Array.isArray(val)?val:[]; };
  function addNote(sid,parentId=null,opts={}){
    setNotes(prev=>{
      const items=prev[sid]||[];
      const siblings=items.filter(n=>n.parentId===(parentId||null));
      const order=siblings.length?Math.max(...siblings.map(n=>n.order))+1:0;
      const base=makeNote(parentId,order);
      const newNote={...base,...(opts.title?{title:opts.title}:{}),...(opts.content?{content:opts.content}:{})};
      return{...prev,[sid]:[...items,newNote]};
    });
  }
  function updateNoteField(sid,noteId,upd){
    setNotes(prev=>({...prev,[sid]:(prev[sid]||[]).map(n=>n.id===noteId?{...n,...upd}:n)}));
  }
  function deleteNote(sid,noteId){
    setNotes(prev=>{
      const items=prev[sid]||[];
      const toRemove=new Set([noteId,...noteDescendants(items,noteId)]);
      return{...prev,[sid]:items.filter(n=>!toRemove.has(n.id))};
    });
  }

  // ── Import / Export
  function exportData(mode){
    const payload={};
    if(mode==="content"||mode==="all"){payload.tasks=tasks;payload.tt=tt;payload.notes=notes;}
    if(mode==="settings"||mode==="all"){payload.sections=sections;}
    payload._export={mode,exportedAt:new Date().toISOString(),version:EXPORT_VERSION};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`progress-you_${mode}_${nowStamp()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  }
  function importData(file){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        const mode=data._export?.mode||"all";
        const lines=[];
        if(data.tasks)    lines.push(`${data.tasks.length} tasks`);
        if(data.tt)       lines.push("timetable data");
        if(data.notes){const total=Object.values(data.notes).reduce((s,a)=>s+(Array.isArray(a)?a.length:1),0);lines.push(`${total} notes`);}
        if(data.sections) lines.push(`${data.sections.length} sections`);
        setDialog({
          message:`Import "${mode}" backup?`,
          detail:`This will replace: ${lines.join(", ")}. This cannot be undone.`,
          confirmLabel:"Import",
          onConfirm:()=>{
            if(data.tasks)    setTasks(data.tasks);
            if(data.tt)       setTt(data.tt);
            if(data.notes)    setNotes(data.notes);
            if(data.sections) setSections(data.sections);
            setDialog({message:"Import successful!",onClose:()=>setDialog(null)});
          },
          onClose:()=>setDialog(null)
        });
      }catch{ setDialog({message:"Could not read file.",detail:"Make sure it's a valid Progress You export (.json).",onClose:()=>setDialog(null)}); }
    };
    reader.readAsText(file);
  }

  // ── Update check
  async function checkForUpdate(onResult) {
    try {
      const skipped = await sget("py-skipped-version");
      const result  = await window.__TAURI__.core.invoke('check_update');
      if (result && result.version !== skipped) {
        setUpdateInfo(result);
        setShowUpdate(true);
        onResult?.({ status: "available", version: result.version });
      } else {
        onResult?.({ status: result ? "skipped" : "latest" });
      }
    } catch(e) {
      onResult?.({ status: "error", message: e?.message || e?.toString() || "Unknown error" });
    }
  }

  if(!ready) return <div style={{minHeight:"100vh",background:"#F8F3EC",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:'"DM Sans",sans-serif',color:"#9B8E80"}}>Loading…</div>;

  const tp={sections,byId,tasks,addTask,updateTask,deleteTask,completeTask,moveTask};

  return (
    <div style={{background:"#F8F3EC",minHeight:"100vh",fontFamily:'"DM Sans",sans-serif',color:"#1C1714"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        button{font-family:inherit;cursor:pointer;} button:hover{opacity:0.82;}
        input:focus,select:focus,textarea:focus{border-color:#8B7D6B!important;outline:none;}
        ::-webkit-scrollbar{width:5px;height:5px;}
        ::-webkit-scrollbar-track{background:#EBE4D8;}
        ::-webkit-scrollbar-thumb{background:#C2B49E;border-radius:4px;}
        .hov-card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.1)!important;}
        .chip-hov:hover{filter:brightness(0.91);}
        .add-btn:hover{background:#EBE4D8!important;border-color:#9B8E80!important;}
        .nav-p{padding:6px 13px;border-radius:8px;border:none;font-size:12px;font-weight:600;transition:all 0.18s;}
        .dz-active{outline:2px dashed #8B7D6B!important;outline-offset:3px;}
        .note-editor{outline:none;}
        .note-editor p{margin:0 0 4px;line-height:1.65;}
        .note-editor ul{margin:4px 0 4px 20px;padding:0;}
        .note-editor ul ul{margin-left:20px;}
        .note-editor li{margin:2px 0;line-height:1.65;}
        .note-editor b,.note-editor strong{font-weight:700;}
        .note-editor i,.note-editor em{font-style:italic;}
        .note-editor u{text-decoration:underline;}
        .tb-btn{padding:4px 8px;border-radius:5px;border:1px solid transparent;background:transparent;font-size:12px;color:#4A3F30;transition:all 0.12s;line-height:1.4;}
        .tb-btn:hover{background:#D4C9B4;border-color:#C2B49E;opacity:1;}
        .tb-btn.on{background:#1C1714;color:#F8F3EC;border-color:#1C1714;}
        select.tb-sel{padding:4px 7px;border-radius:5px;border:1px solid #D6CEC3;background:#FDFAF6;font-family:inherit;font-size:11px;color:#4A3F30;outline:none;}
        select.tb-sel:focus{border-color:#8B7D6B;}
        .note-row{display:flex;align-items:center;gap:4px;padding:5px 8px 5px 6px;border-radius:7px;cursor:pointer;transition:background 0.12s;}
        .note-row:hover{background:#E3D9CC;}
        .note-row.active{background:#1C1714;color:#F8F3EC;}
        .note-actions{visibility:hidden;display:flex;gap:2px;margin-left:auto;flex-shrink:0;}
        .note-row:hover .note-actions,.note-row.active .note-actions{visibility:visible;}
        .note-act-btn{width:18px;height:18px;border-radius:4px;border:none;background:transparent;font-size:11px;display:flex;align-items:center;justify-content:center;color:#7A6C5E;cursor:pointer;flex-shrink:0;}
        .note-act-btn:hover{background:#C2B49E;opacity:1;color:#1C1714;}
        .note-row.active .note-act-btn{color:#C2B49E;}
        .note-row.active .note-act-btn:hover{background:rgba(255,255,255,0.15);color:#F8F3EC;}
        .cap-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;
          background:linear-gradient(135deg,#C8A86B,#A07840);color:#1C1714;font-size:12px;font-weight:700;
          cursor:pointer;transition:all 0.18s;box-shadow:0 2px 8px rgba(200,168,107,0.35);}
        .cap-btn:hover{opacity:1;transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,168,107,0.45);}
        .upcoming-task:hover{background:#E8E0D4!important;}
      `}</style>

      {/* ── Header ── */}
      <header style={{background:"#1C1714",color:"#F8F3EC",padding:"11px 24px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:"0 3px 20px rgba(0,0,0,0.38)"}}>
        <div style={{flexShrink:0,marginRight:4}}>
          <div style={{fontFamily:'"Playfair Display",serif',fontSize:18,fontWeight:700,lineHeight:1}}>
            Progress <em style={{fontStyle:"italic",color:"#C8A86B"}}>You</em>
          </div>
          <div style={{fontSize:9,color:"#5A4E46",letterSpacing:"1.6px",textTransform:"uppercase",marginTop:2}}>Notebook System</div>
        </div>

        <nav style={{display:"flex",gap:3,background:"#2C2522",borderRadius:10,padding:3}}>
          {[["today","Today"],["timetable","Timetable"],["boards","Boards"],["notes","Notes"],["monthly","Log"],["stats","Stats"]].map(([v,l])=>(
            <button key={v} className="nav-p" onClick={()=>setView(v)}
              style={{background:view===v?"#F8F3EC":"transparent",color:view===v?"#1C1714":"#7A6C5E"}}>{l}</button>
          ))}
        </nav>

        {/* ⚡ Quick Capture — always visible */}
        <button className="cap-btn" onClick={()=>setShowCap(true)} title="Quick Capture (Ctrl+Space)">
          <span style={{fontSize:14}}>⚡</span>
          <span>Capture</span>
          <span style={{fontSize:9,opacity:0.6,fontWeight:400}}>Ctrl+Space</span>
        </button>

        {view==="timetable"&&(
          <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
            <button onClick={copyPrevWeek} style={{padding:"5px 11px",borderRadius:7,border:"1px solid #3A302A",background:"transparent",color:"#7A6C5E",fontSize:11,fontWeight:600}}>↩ Copy prev</button>
            <button onClick={()=>setWeek(w=>shiftWeek(w,-1))} style={{width:30,height:30,borderRadius:7,border:"1px solid #3A302A",background:"transparent",color:"#F8F3EC",fontSize:18}}>‹</button>
            <span style={{fontSize:12,color:"#C2B49E",minWidth:178,textAlign:"center",fontWeight:500}}>{weekLabel(week)}</span>
            <button onClick={()=>setWeek(w=>shiftWeek(w, 1))} style={{width:30,height:30,borderRadius:7,border:"1px solid #3A302A",background:"transparent",color:"#F8F3EC",fontSize:18}}>›</button>
            <button onClick={()=>setWeek(mondayOf(new Date()))} style={{padding:"5px 11px",borderRadius:7,border:"1px solid #3A302A",background:"transparent",color:"#7A6C5E",fontSize:11,fontWeight:600}}>Today</button>
          </div>
        )}

        <div style={{display:"flex",gap:6,marginLeft:view==="timetable"?8:"auto",alignItems:"center"}}>
          <button onClick={()=>setShowIO(true)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #3A302A",background:"transparent",color:"#7A6C5E",fontSize:11,fontWeight:600}}>⇅ Data</button>
          <button onClick={()=>setShowSett(true)} style={{width:34,height:34,borderRadius:8,border:"1px solid #3A302A",background:"transparent",color:"#7A6C5E",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
        </div>
      </header>

// ─── Quick Capture Modal ──────────────────────────────────────────────────────

function QuickCaptureModal({sections,byId,addTask,addNote,onClose}) {
  const [type,    setType]    = useState("task");  // "task" | "note"
  const [secId,   setSecId]   = useState(sections[0]?.id||"");
  const [title,   setTitle]   = useState("");
  const [body,    setBody]    = useState("");
  const [hasDue,  setHasDue]  = useState(false);
  const [dueDate, setDueDate] = useState(todayISO());
  const [saved,   setSaved]   = useState(false);
  const titleRef = useRef();

  useEffect(()=>{ setTimeout(()=>titleRef.current?.focus(),60); },[]);

  // Keyboard: Escape → close, Ctrl+Enter → save
  useEffect(()=>{
    const handler = e => {
      if(e.key==="Escape") onClose();
      if((e.ctrlKey||e.metaKey)&&e.key==="Enter") handleSave();
    };
    window.addEventListener("keydown",handler);
    return ()=>window.removeEventListener("keydown",handler);
  },[title,body,type,secId,hasDue,dueDate]);

  function handleSave() {
    if(!title.trim()) { titleRef.current?.focus(); return; }
    if(type==="task") {
      addTask(secId,title.trim(),body.trim(),{dueDate:hasDue?dueDate:null});
    } else {
      addNote(secId, null, {
        title: title.trim(),
        content: body.trim() ? `<p>${body.trim()}</p>` : "<p><br></p>"
      });
    }
    setSaved(true);
    setTimeout(()=>{ onClose(); },500);
  }

  const sec = byId[secId]||sections[0]||{color:"#7C7166"};

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(28,23,20,0.72)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:300,padding:"80px 20px 20px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#FDFAF6",borderRadius:16,width:"100%",maxWidth:540,boxShadow:"0 32px 80px rgba(0,0,0,0.48)",border:"1px solid #E3D9CC",overflow:"hidden"}}>

        {/* Header strip */}
        <div style={{background:"#1C1714",padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>⚡</span>
          <span style={{fontFamily:'"Playfair Display",serif',fontSize:16,fontWeight:700,color:"#F8F3EC"}}>Quick Capture</span>
          <span style={{fontSize:11,color:"#5A4E46",marginLeft:4}}>Ctrl+Enter to save · Esc to dismiss</span>
          <button onClick={onClose} style={{marginLeft:"auto",width:26,height:26,borderRadius:6,border:"none",background:"transparent",color:"#7A6C5E",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        <div style={{padding:"20px"}}>
          {/* Type + Section row */}
          <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
            {/* Type toggle */}
            <div style={{display:"flex",gap:2,background:"#EBE4D8",borderRadius:8,padding:3}}>
              {[["task","📋 Task"],["note","📝 Note"]].map(([t,l])=>(
                <button key={t} onClick={()=>setType(t)} style={{padding:"5px 12px",borderRadius:6,border:"none",fontSize:12,fontWeight:600,background:type===t?"#FDFAF6":"transparent",color:type===t?"#1C1714":"#7A6C5E",boxShadow:type===t?"0 1px 4px rgba(0,0,0,0.1)":"none",transition:"all 0.15s"}}>{l}</button>
              ))}
            </div>
            {/* Section picker */}
            <div style={{flex:1,position:"relative"}}>
              <select value={secId} onChange={e=>setSecId(e.target.value)}
                style={{...S.input,marginBottom:0,paddingLeft:32,appearance:"none",
                  borderColor:sec.color+"80",background:sec.color+"12",fontWeight:600,color:sec.color}}>
                {sections.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
              </select>
              <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",width:10,height:10,borderRadius:"50%",background:sec.color,pointerEvents:"none"}}/>
            </div>
          </div>

          {/* Title */}
          <input
            ref={titleRef}
            value={title}
            onChange={e=>setTitle(e.target.value)}
            placeholder={type==="task"?"Task title…":"Note title…"}
            style={{...S.input,fontSize:15,fontWeight:600,marginBottom:10}}
          />

          {/* Body */}
          <textarea
            value={body}
            onChange={e=>setBody(e.target.value)}
            placeholder={type==="task"?"Notes, context, links… (optional)":"Jot it down… (optional)"}
            style={{...S.input,resize:"vertical",minHeight:72,fontSize:13,fontWeight:400}}
          />

          {/* Due date (tasks only) */}
          {type==="task"&&(
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,padding:"10px 12px",background:"#F3EDE3",borderRadius:9,border:"1px solid #E3D9CC"}}>
              <button onClick={()=>setHasDue(v=>!v)} style={{
                width:18,height:18,borderRadius:4,border:`2px solid ${hasDue?"#4B3FC7":"#C2B49E"}`,
                background:hasDue?"#4B3FC7":"transparent",flexShrink:0,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",
              }}>{hasDue?"✓":""}</button>
              <span style={{fontSize:12,fontWeight:600,color:"#4A3F30",userSelect:"none",cursor:"pointer"}} onClick={()=>setHasDue(v=>!v)}>Set due date</span>
              {hasDue&&(
                <input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)}
                  style={{...S.input,marginBottom:0,flex:1,padding:"5px 10px",fontSize:12}}/>
              )}
            </div>
          )}

          {/* Actions */}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={handleSave} style={{...S.btnDark,background:saved?"#1A7A43":sec.color,flex:1,display:"flex",justifyContent:"center",gap:8,transition:"background 0.3s"}}>
              {saved ? "✓ Saved!" : (type==="task"?"Add to Backlog":"Create Note")}
            </button>
            <button onClick={onClose} style={S.btnGhost}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Upcoming Digest ──────────────────────────────────────────────────────────

function UpcomingDigest({tasks,byId,completeTask,updateTask}) {
  const today     = todayISO();
  const endWeek   = addDays(today,7);
  const endMonth  = addDays(today,31);

  // Only undone tasks with a dueDate
  const dated = tasks.filter(t=>t.dueDate&&t.status!=="done"&&t.type!=="spacer");
  if(dated.length===0) return null;

  const overdue   = dated.filter(t=>t.dueDate<=today).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const thisWeek  = dated.filter(t=>t.dueDate>today&&t.dueDate<=endWeek).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const thisMonth = dated.filter(t=>t.dueDate>endWeek&&t.dueDate<=endMonth).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));

  if(overdue.length+thisWeek.length+thisMonth.length===0) return null;

  function DueTask({task}) {
    const sec   = byId[task.sectionId]||{color:"#9B8E80",label:"?"};
    const due   = fmtDue(task.dueDate);
    return (
      <div className="upcoming-task" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:9,background:"#F8F3EC",border:"1px solid #E3D9CC",cursor:"default",transition:"background 0.12s"}}>
        <button onClick={()=>completeTask(task.id)} title="Mark done"
          style={{width:16,height:16,borderRadius:4,border:`2px solid ${sec.color}`,background:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:sec.color}}>✓</button>
        <span style={{fontSize:12,flex:1,fontWeight:500,color:"#1C1714"}}>{task.title}</span>
        <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:700,background:sec.color+"20",color:sec.color,flexShrink:0}}>{sec.label}</span>
        <span style={{fontSize:10,fontWeight:700,flexShrink:0,color:due.urgent?"#C43A3A":"#7A6C5E",background:due.urgent?"#FAE8E8":"#EBE4D8",padding:"2px 7px",borderRadius:10}}>{due.label}</span>
      </div>
    );
  }

  function Bucket({title,accentColor,tasks}) {
    if(tasks.length===0) return null;
    return (
      <div>
        <div style={{fontSize:10,fontWeight:700,color:accentColor,letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:7,display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:accentColor,flexShrink:0}}/>
          {title} <span style={{fontWeight:400,color:"#9B8E80",textTransform:"none",letterSpacing:0}}>({tasks.length})</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {tasks.map(t=><DueTask key={t.id} task={t}/>)}
        </div>
      </div>
    );
  }

  return (
    <div style={{background:"#EBE4D8",borderRadius:14,padding:"16px 18px",marginBottom:24,border:"1px solid #D6CEC3"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <span style={{fontSize:15}}>📅</span>
        <span style={{fontFamily:'"Playfair Display",serif',fontSize:15,fontWeight:700}}>Upcoming</span>
        <span style={{fontSize:11,color:"#9B8E80",marginLeft:4}}>{dated.length} time-sensitive task{dated.length!==1?"s":""}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Bucket title="Overdue & Today" accentColor="#C43A3A" tasks={overdue}/>
        <Bucket title="This Week"       accentColor="#4B3FC7" tasks={thisWeek}/>
        <Bucket title="Within a Month"  accentColor="#1A7A43" tasks={thisMonth}/>
      </div>
    </div>
  );
}

        <div style={{flex:1}}><span style={S.lbl}>End</span>  <input type="time" value={end}   onChange={e=>setEnd(e.target.value)}   style={S.input}/></div>

// ─── Boards View ──────────────────────────────────────────────────────────────

function BoardsView({sections,byId,tasks,addTask,updateTask,deleteTask,completeTask,moveTask}) {
  const boardSecs=sections.filter(s=>s.id!=="overhead");
  const [secId,   setSecId]   =useState(boardSecs[0]?.id||"");
  const [adding,  setAdding]  =useState(false);
  const [newTitle,setNewTitle]=useState("");
  const [newNotes,setNewNotes]=useState("");
  const [newHasDue,setNewHasDue]=useState(false);
  const [newDue,  setNewDue]  =useState(todayISO());
  const [dragId,  setDragId]  =useState(null);
  const [overInfo,setOverInfo]=useState(null);
  useEffect(()=>{ if(!boardSecs.find(s=>s.id===secId)&&boardSecs.length>0) setSecId(boardSecs[0].id); },[sections]);
  const sec=byId[secId]||boardSecs[0]||{color:"#7C7166",label:""};
  const sTasks=tasks.filter(t=>t.sectionId===secId);
  const COLS=[{key:"backlog",label:"Backlog",dot:"#8B7D6B"},{key:"this-week",label:"This Week",dot:"#4B3FC7"},{key:"done",label:"Done",dot:"#1A7A43"}];
  function handleAdd() {
    if(!newTitle.trim()) return;
    addTask(secId,newTitle.trim(),newNotes.trim(),{dueDate:newHasDue?newDue:null});
    setNewTitle(""); setNewNotes(""); setNewHasDue(false); setAdding(false);
  }
  const onDragStart=id=>setDragId(id);
  const onDragOver=(col,bid=null)=>setOverInfo({col,beforeId:bid});
  function onDrop(col,bid=null){ if(dragId) moveTask(dragId,bid,col); setDragId(null); setOverInfo(null); }
  const onDragEnd=()=>{ setDragId(null); setOverInfo(null); };
  return (
    <div>
      <div style={{display:"flex",gap:4,marginBottom:22,flexWrap:"wrap",background:"#EBE4D8",borderRadius:12,padding:4,width:"fit-content",maxWidth:"100%"}}>
        {boardSecs.map(s=>(
          <button key={s.id} onClick={()=>{setSecId(s.id);setAdding(false);}} style={{padding:"6px 14px",borderRadius:9,border:"none",fontSize:12,fontWeight:600,transition:"all 0.2s",background:secId===s.id?s.color:"transparent",color:secId===s.id?textFor(s.color):"#6B5E4E"}}>{s.label}</button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <Dot color={sec.color} size={13}/>
        <h2 style={{fontFamily:'"Playfair Display",serif',fontSize:24,fontWeight:700}}>{sec.label}</h2>
        <div style={{flex:1}}/>
        <button onClick={()=>addTask(secId,"","",{type:"spacer",status:"backlog"})} style={{...S.btnGhost,fontSize:12}}>+ Spacer</button>
        <button onClick={()=>setAdding(v=>!v)} style={{...S.btnDark,background:sec.color}}>{adding?"Cancel":"+ Add Task"}</button>
      </div>
      {adding&&(
        <div style={{background:"#EBE4D8",borderRadius:12,padding:"18px 20px",marginBottom:22,border:`2px solid ${sec.color}30`}}>
          <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Task title…" style={S.input} autoFocus onKeyDown={e=>e.key==="Enter"&&handleAdd()}/>
          <textarea value={newNotes} onChange={e=>setNewNotes(e.target.value)} placeholder="Notes (optional)…" style={{...S.input,resize:"vertical",minHeight:60}}/>
          {/* Due date toggle */}
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"9px 12px",background:"#F3EDE3",borderRadius:9,border:"1px solid #E3D9CC"}}>
            <button onClick={()=>setNewHasDue(v=>!v)} style={{width:18,height:18,borderRadius:4,border:`2px solid ${newHasDue?"#4B3FC7":"#C2B49E"}`,background:newHasDue?"#4B3FC7":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff"}}>{newHasDue?"✓":""}</button>
            <span style={{fontSize:12,fontWeight:600,color:"#4A3F30",cursor:"pointer"}} onClick={()=>setNewHasDue(v=>!v)}>Set due date</span>
            {newHasDue&&<input type="date" value={newDue} onChange={e=>setNewDue(e.target.value)} style={{...S.input,marginBottom:0,flex:1,padding:"5px 10px",fontSize:12}}/>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={handleAdd} style={{...S.btnDark,background:sec.color}}>Add to Backlog</button>
            <button onClick={()=>setAdding(false)} style={S.btnGhost}>Cancel</button>
          </div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>
        {COLS.map(col=>{
          const colTasks=sTasks.filter(t=>t.status===col.key);
          const isColOver=overInfo?.col===col.key&&overInfo?.beforeId===null;
          return (
            <div key={col.key} onDragOver={e=>{e.preventDefault();if(overInfo?.beforeId!==null)onDragOver(col.key,null);}}
                 onDrop={e=>{e.preventDefault();onDrop(col.key,null);}} className={isColOver?"dz-active":""}
                 style={{background:"#EBE4D8",borderRadius:13,padding:"14px 14px 16px",minHeight:140,transition:"background 0.15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:14}}>
                <Dot color={col.dot} size={8}/>
                <span style={{fontWeight:700,fontSize:13}}>{col.label}</span>
                <span style={{marginLeft:"auto",background:"#D4C9B4",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700,color:"#6B5E4E"}}>{colTasks.filter(t=>t.type!=="spacer").length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {colTasks.length===0&&!dragId&&<div style={{fontSize:12,color:"#9B8E80",fontStyle:"italic",padding:"4px 2px"}}>Empty</div>}
                {colTasks.map(task=>{
                  const isOver=overInfo?.col===col.key&&overInfo?.beforeId===task.id;
                  if(task.type==="spacer") return (
                    <SpacerCard key={task.id} task={task} isOver={isOver} isDragging={dragId===task.id}
                      onDragStart={()=>onDragStart(task.id)} onDragOver={()=>onDragOver(col.key,task.id)}
                      onDragEnd={onDragEnd} deleteTask={deleteTask}/>
                  );
                  return (
                    <TaskCard key={task.id} task={task} secColor={sec.color} isOver={isOver} isDragging={dragId===task.id}
                      onDragStart={()=>onDragStart(task.id)} onDragOver={()=>onDragOver(col.key,task.id)}
                      onDragEnd={onDragEnd} updateTask={updateTask} deleteTask={deleteTask} completeTask={completeTask}/>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
function SpacerCard({task,isOver,isDragging,onDragStart,onDragOver,onDragEnd,deleteTask}) {
  const [hov,setHov]=useState(false);
  return (
    <div draggable onDragStart={e=>{e.stopPropagation();onDragStart();}} onDragOver={e=>{e.preventDefault();e.stopPropagation();onDragOver();}} onDragEnd={onDragEnd}
         onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
         style={{display:"flex",alignItems:"center",gap:8,padding:"5px 4px",cursor:"grab",opacity:isDragging?0.35:1,outline:isOver?"2px dashed #8B7D6B":"none",borderRadius:6}}>
      <div style={{flex:1,height:1,background:"#C2B49E",borderRadius:1}}/>
      {hov&&<button onClick={e=>{e.stopPropagation();deleteTask(task.id);}} style={{...S.btnMicro,background:"#FAE0E0",color:"#C43A3A",padding:"2px 6px",fontSize:10}}>✕</button>}
      <div style={{flex:1,height:1,background:"#C2B49E",borderRadius:1}}/>
    </div>

}
function TaskCard({task,secColor,isOver,isDragging,onDragStart,onDragOver,onDragEnd,updateTask,deleteTask,completeTask}) {
  const [open,   setOpen]   =useState(false);
  const [hasDue, setHasDue] =useState(!!task.dueDate);
  const [dueDate,setDueDate]=useState(task.dueDate||todayISO());
  const done=task.status==="done";
  const due =task.dueDate?fmtDue(task.dueDate):null;

  function saveDue(has,date) {
    updateTask(task.id,{dueDate:has?date:null});
  }

  return (
    <div draggable onDragStart={e=>{e.stopPropagation();onDragStart();}} onDragOver={e=>{e.preventDefault();e.stopPropagation();onDragOver();}} onDragEnd={onDragEnd}
         className="hov-card"
         style={{background:"#FDFAF6",borderRadius:9,padding:"10px 12px",border:"1px solid #E3D9CC",borderLeft:`3px solid ${secColor}`,opacity:isDragging?0.35:1,outline:isOver?"2px dashed #8B7D6B":"none",boxShadow:"none",transition:"box-shadow 0.15s,opacity 0.15s",cursor:"grab"}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:6}}>
        <div style={{fontSize:13,fontWeight:500,color:done?"#9B8E80":"#1C1714",textDecoration:done?"line-through":"none",lineHeight:1.4,cursor:"pointer",userSelect:"none",flex:1}} onClick={()=>setOpen(o=>!o)}>
          {task.title}
        </div>
        {due&&!done&&<span style={{fontSize:10,fontWeight:700,flexShrink:0,color:due.urgent?"#C43A3A":"#7A6C5E",background:due.urgent?"#FAE8E8":"#EBE4D8",padding:"2px 6px",borderRadius:8,marginTop:1}}>{due.label}</span>}
      </div>
      {open&&(
        <div style={{marginTop:9}} onMouseDown={e=>e.stopPropagation()}>
          {task.notes&&<p style={{fontSize:12,color:"#6B5E4E",lineHeight:1.5,marginBottom:9}}>{task.notes}</p>}
          {done&&task.completedAt&&<p style={{fontSize:11,color:"#9B8E80",marginBottom:9}}>✓ {new Date(task.completedAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</p>}
          {/* Due date editor */}
          {!done&&(
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,padding:"8px 10px",background:"#F3EDE3",borderRadius:8,border:"1px solid #E3D9CC"}}>

                style={{width:16,height:16,borderRadius:3,border:`2px solid ${hasDue?"#4B3FC7":"#C2B49E"}`,background:hasDue?"#4B3FC7":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff"}}>{hasDue?"✓":""}</button>
              <span style={{fontSize:11,fontWeight:600,color:"#4A3F30",cursor:"pointer"}} onClick={()=>{ const next=!hasDue; setHasDue(next); saveDue(next,dueDate); }}>Due date</span>
              {hasDue&&<input type="date" value={dueDate} onChange={e=>{ setDueDate(e.target.value); saveDue(true,e.target.value); }} style={{...S.input,marginBottom:0,flex:1,padding:"3px 8px",fontSize:11}}/>}
            </div>
          )}
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {task.status!=="backlog"   &&<button onClick={e=>{e.stopPropagation();updateTask(task.id,{status:"backlog"});}}   style={S.btnMicro}>↩ Backlog</button>}
            {task.status!=="this-week" &&<button onClick={e=>{e.stopPropagation();updateTask(task.id,{status:"this-week"});}} style={{...S.btnMicro,background:"#E6E3F5",color:"#4B3FC7"}}>→ This Week</button>}
            {task.status!=="done"      &&<button onClick={e=>{e.stopPropagation();completeTask(task.id);}}                   style={{...S.btnMicro,background:"#D4F0E0",color:"#1A7A43"}}>✓ Done</button>}
            <button onClick={e=>{e.stopPropagation();deleteTask(task.id);}} style={{...S.btnMicro,background:"#FAE0E0",color:"#C43A3A",marginLeft:"auto"}}>✕</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Notes View ───────────────────────────────────────────────────────────────

function NotesView({sections,byId,getSectionNotes,addNote,updateNoteField,deleteNote}) {
  const [secId,     setSecId]     =useState(sections[0]?.id||"");
  const [selNoteId, setSelNoteId] =useState(null);
  const [collapsed, setCollapsed] =useState({});
  const [confirmDel,setConfirmDel]=useState(null);
  const sec  =byId[secId]||sections[0]||{color:"#7C7166",label:""};
  const items=getSectionNotes(secId);
  const selNote=items.find(n=>n.id===selNoteId)||null;
  useEffect(()=>{
    const roots=noteChildren(items,null);
    if(!selNoteId&&roots.length>0) setSelNoteId(roots[0].id);
    if(selNoteId&&!items.find(n=>n.id===selNoteId)) setSelNoteId(roots[0]?.id||null);
  },[secId,items.length]);
  const toggleCollapse=id=>setCollapsed(p=>({...p,[id]:!p[id]}));
  function handleDelete(id){ setConfirmDel(id); }
  function renderNode(node,depth=0) {
    const children=noteChildren(items,node.id);
    const isOpen=!collapsed[node.id];
    const isActive=selNoteId===node.id;
    return (
      <div key={node.id}>
        <div className={`note-row${isActive?" active":""}`} style={{paddingLeft:8+depth*16}} onClick={()=>setSelNoteId(node.id)}>
          <button onClick={e=>{e.stopPropagation();toggleCollapse(node.id);}}
            style={{width:14,height:14,border:"none",background:"transparent",color:"inherit",fontSize:9,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",opacity:children.length?1:0.2}}>
            {children.length?(isOpen?"▾":"▸"):"·"}
          </button>
          <span style={{fontSize:12,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:isActive?600:400}}>{node.title||"Untitled"}</span>
          <div className="note-actions">
            <button className="note-act-btn" title="Add sub-note" onClick={e=>{e.stopPropagation();addNote(secId,node.id);}}>+</button>
            <button className="note-act-btn" title="Delete" onClick={e=>{e.stopPropagation();handleDelete(node.id);}}>✕</button>
          </div>
        </div>
        {isOpen&&children.length>0&&<div>{children.map(c=>renderNode(c,depth+1))}</div>}
      </div>
    );
  }
  const roots=noteChildren(items,null);
  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 100px)",minHeight:600,background:"#EBE4D8",borderRadius:14,overflow:"hidden",border:"1px solid #D6CEC3"}}>
      {/* Section tab bar */}
      <div style={{display:"flex",alignItems:"stretch",background:"#1C1714",flexShrink:0,overflowX:"auto",padding:"0 6px"}}>
        {sections.map(s=>{
          const active=secId===s.id;
          return (
            <button key={s.id} onClick={()=>{setSecId(s.id);setSelNoteId(null);setConfirmDel(null);}} style={{padding:"10px 16px",border:"none",cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap",background:active?s.color:"transparent",color:active?textFor(s.color):"#7A6C5E",borderBottom:active?`3px solid ${s.color}`:"3px solid transparent",transition:"all 0.15s",flexShrink:0}}>{s.label}</button>
          );
        })}
      </div>
      {/* Body */}
      <div style={{flex:1,display:"grid",gridTemplateColumns:"230px 1fr",minHeight:0}}>
        <div style={{display:"flex",flexDirection:"column",overflow:"hidden",borderRight:"1px solid #D6CEC3",background:"#EBE4D8"}}>
          <div style={{flex:1,overflowY:"auto",padding:"8px 6px"}}>
            {roots.length===0?<div style={{fontSize:12,color:"#9B8E80",fontStyle:"italic",padding:"12px 8px"}}>No notes yet.</div>:roots.map(n=>renderNode(n,0))}
          </div>
          {confirmDel&&(
            <div style={{padding:"10px",background:"#FAE0E0",borderTop:"1px solid #F1A0A0",flexShrink:0}}>
              <div style={{fontSize:11,color:"#C43A3A",fontWeight:600,marginBottom:7}}>Delete{noteDescendants(items,confirmDel).length>0?" note + sub-notes":"  this note"}?</div>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>{deleteNote(secId,confirmDel);setConfirmDel(null);}} style={{...S.btnMicro,background:"#C43A3A",color:"#fff",flex:1}}>Yes, delete</button>
                <button onClick={()=>setConfirmDel(null)} style={{...S.btnMicro,flex:1}}>Cancel</button>
              </div>
            </div>
          )}
          <div style={{padding:"9px 8px",borderTop:"1px solid #D6CEC3",display:"flex",gap:5,flexShrink:0}}>
            <button onClick={()=>addNote(secId,selNote?.parentId||null)} style={{...S.btnDark,flex:1,background:sec.color,padding:"7px 0",fontSize:11}}>+ Note</button>
            <button onClick={()=>{ if(selNote) addNote(secId,selNote.id); }} style={{...S.btnGhost,padding:"7px 10px",fontSize:11,opacity:selNote?1:0.45}}>+Child</button>
          </div>
        </div>
        <div style={{background:"#FDFAF6",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {selNote
            ? <NoteEditor key={selNote.id} note={selNote} sectionColor={sec.color}
                onTitleChange={t=>updateNoteField(secId,selNote.id,{title:t})}
                onContentChange={c=>updateNoteField(secId,selNote.id,{content:c})}/>
            : <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:10,color:"#9B8E80"}}>
                <div style={{fontSize:28}}>📝</div>
                <div style={{fontSize:14,fontWeight:600,color:"#6B5E4E"}}>No note selected</div>
                <div style={{fontSize:12}}>Create one with + Note, or select one from the sidebar.</div>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

// ─── Note Editor ──────────────────────────────────────────────────────────────

function NoteEditor({note,sectionColor,onTitleChange,onContentChange}) {
  const editorRef  =useRef(null);
  const saveTimer  =useRef(null);
  const titleTimer =useRef(null);
  const [saved,   setSaved]   =useState(true);
  const [titleVal,setTitleVal]=useState(note.title||"");
  const [selColor,setSelColor]=useState("#1C1714");
  const [showClr, setShowClr] =useState(false);
  const [fmtState,setFmtState]=useState({bold:false,italic:false,underline:false});
  useEffect(()=>{ if(editorRef.current) editorRef.current.innerHTML=note.content||"<p><br></p>"; },[]);
  const schedSave=()=>{ setSaved(false); clearTimeout(saveTimer.current); saveTimer.current=setTimeout(()=>{ if(editorRef.current) onContentChange(editorRef.current.innerHTML); setSaved(true); },500); };
  const schedTitleSave=v=>{ setSaved(false); clearTimeout(titleTimer.current); titleTimer.current=setTimeout(()=>{ onTitleChange(v); setSaved(true); },400); };
  const refreshFmt=()=>setFmtState({bold:document.queryCommandState("bold"),italic:document.queryCommandState("italic"),underline:document.queryCommandState("underline")});
  const cmd=(command,value=null)=>{ editorRef.current?.focus(); document.execCommand(command,false,value); refreshFmt(); schedSave(); };
  function wrapSelection(styleProp,styleVal){
    const sel=window.getSelection(); if(!sel||sel.rangeCount===0||sel.isCollapsed) return;
    const range=sel.getRangeAt(0); const span=document.createElement("span"); span.style[styleProp]=styleVal;
    try{ range.surroundContents(span); }catch{ const frag=range.extractContents(); span.appendChild(frag); range.insertNode(span); }
    sel.removeAllRanges(); schedSave();
  }
  function caretToEnd(el){ const range=document.createRange(); range.selectNodeContents(el); range.collapse(false); const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }
  function currentLi(){ const sel=window.getSelection(); if(!sel||sel.rangeCount===0) return null; let node=sel.anchorNode; if(node.nodeType===3) node=node.parentElement; return node?.closest("li")||null; }
  function caretAtLineStart(){ const sel=window.getSelection(); if(!sel||sel.rangeCount===0) return false; const range=sel.getRangeAt(0); return range.collapsed&&range.startOffset===0; }
  const handleKeyDown=e=>{
    if(e.key==="Tab"){
      e.preventDefault();
      const li=currentLi();
      if(li){ if(e.shiftKey) cmd("outdent"); else cmd("indent"); requestAnimationFrame(()=>{ const newLi=currentLi(); if(newLi) caretToEnd(newLi); }); }
      return;
    }
    if(e.key==="Backspace"){ const li=currentLi(); if(li&&caretAtLineStart()){ const parentUl=li.parentElement; const isNested=parentUl?.parentElement?.tagName==="LI"; if(isNested){ e.preventDefault(); cmd("outdent"); return; } } }
    if(showClr) setShowClr(false);
  };
  const applyColor=v=>{ setSelColor(v); cmd("foreColor",v); setShowClr(false); };
  const sep=<div style={{width:1,height:18,background:"#D6CEC3",flexShrink:0,margin:"0 2px"}}/>;
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 24px 0",borderBottom:"1px solid #EBE4D8",flexShrink:0}}>
        <input value={titleVal} onChange={e=>{setTitleVal(e.target.value);schedTitleSave(e.target.value);}} onKeyDown={e=>e.key==="Enter"&&e.currentTarget.blur()} placeholder="Note title…"
          style={{...S.input,marginBottom:0,border:"none",background:"transparent",fontSize:17,fontWeight:700,fontFamily:'"Playfair Display",serif',padding:"0 0 14px",borderRadius:0}}/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:3,padding:"7px 12px",background:"#F3EDE3",borderBottom:"1px solid #E3D9CC",flexWrap:"wrap",flexShrink:0}}>
        <select className="tb-sel" defaultValue={EDITOR_FONTS[0].value} onChange={e=>wrapSelection("fontFamily",e.target.value)}>

// ─── Monthly View ─────────────────────────────────────────────────────────────

function MonthlyView({tasks,sections,byId}) {
  const allMonths=[...new Set(tasks.filter(t=>t.monthCompleted).map(t=>t.monthCompleted))].sort().reverse();
  const now=monthKeyOf(Date.now());
  if(!allMonths.includes(now)) allMonths.unshift(now);
  const [sel,setSel]=useState(now);
  const done=tasks.filter(t=>t.status==="done"&&t.monthCompleted===sel&&t.type!=="spacer");
  const bySec={};
  for(const t of done){if(!bySec[t.sectionId])bySec[t.sectionId]=[];bySec[t.sectionId].push(t);}
  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:28,flexWrap:"wrap"}}>
        {allMonths.map(m=>(
          <button key={m} onClick={()=>setSel(m)} style={{padding:"6px 16px",borderRadius:20,border:"1.5px solid",fontSize:12,fontWeight:600,transition:"all 0.15s",borderColor:sel===m?"#1C1714":"#D6CEC3",background:sel===m?"#1C1714":"transparent",color:sel===m?"#F8F3EC":"#6B5E4E"}}>{fmtMonth(m)}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:20,alignItems:"baseline",marginBottom:26,paddingBottom:20,borderBottom:"2px solid #E3D9CC"}}>
        <h2 style={{fontFamily:'"Playfair Display",serif',fontSize:26,fontWeight:700}}>{fmtMonth(sel)}</h2>
        <span style={{fontSize:13,color:"#9B8E80"}}><strong style={{color:"#1C1714",fontSize:20}}>{done.length}</strong> tasks &nbsp;·&nbsp; <strong style={{color:"#1C1714",fontSize:20}}>{Object.keys(bySec).length}</strong> sections</span>
      </div>
      {done.length===0&&<Empty icon="📅" text="Nothing completed yet this month." sub="Mark tasks as done in Boards to see them here."/>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
        {Object.entries(bySec).map(([sid,ts])=>{
          const sec=byId[sid]||{label:sid,color:"#9B8E80"};
          return (
            <div key={sid} style={{background:"#EBE4D8",borderRadius:12,padding:"14px 16px",borderTop:`3px solid ${sec.color}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <span style={{fontWeight:700,fontSize:13}}>{sec.label}</span>
                <span style={{marginLeft:"auto",background:sec.color,color:textFor(sec.color),borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700}}>{ts.length}</span>
              </div>
              <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:6}}>
                {ts.map(t=>(
                  <li key={t.id} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                    <span style={{color:sec.color,fontSize:10,marginTop:3,flexShrink:0,fontWeight:700}}>✓</span>
                    <span style={{fontSize:12,color:"#6B5E4E",textDecoration:"line-through",lineHeight:1.4}}>{t.title}</span>
                  </li>
                ))}
              </ul>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Stats View ───────────────────────────────────────────────────────────────

function StatsView({tasks,tt,week,sections,byId}) {
  const wBlocks=tt[week]||{};
  const secMins={};
  let totalMins=0;
  for(const day of DAYS){
    for(const blk of (wBlocks[day]||[])){
      if(blk.type==="break"||!blk.sectionId) continue;
      const m=blockMins(blk); secMins[blk.sectionId]=(secMins[blk.sectionId]||0)+m; totalMins+=m;
    }
  }
  const weekStart=new Date(week+"T00:00:00"),weekEnd=new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+7);
  const allActive  =tasks.filter(t=>t.type!=="spacer"&&t.status==="this-week");
  const completedTW=tasks.filter(t=>t.type!=="spacer"&&t.completedAt&&new Date(t.completedAt)>=weekStart&&new Date(t.completedAt)<weekEnd);
  const backlogAll =tasks.filter(t=>t.type!=="spacer"&&t.status==="backlog").length;
  const boardSecs  =sections.filter(s=>s.id!=="overhead");
  // Completion rate: tasks completed this week vs tasks created this week still active.
  // Filters out stale "this-week" tasks from older weeks that were never resolved.
  const activeCreatedThisWeek=allActive.filter(t=>t.createdAt&&new Date(t.createdAt)>=weekStart&&new Date(t.createdAt)<weekEnd);
  const compRate=completedTW.length+activeCreatedThisWeek.length>0?Math.round(completedTW.length/(completedTW.length+activeCreatedThisWeek.length)*100):null;
  return (
    <div>
      <h2 style={{fontFamily:'"Playfair Display",serif',fontSize:24,fontWeight:700,marginBottom:4}}>Weekly Stats</h2>
      <p style={{fontSize:13,color:"#9B8E80",marginBottom:28}}>{weekLabel(week)}</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
        {[[(totalMins/60).toFixed(1)+"h","Scheduled","this week"],[allActive.length,"In Progress","this-week tasks"],[completedTW.length,"Completed","this week"],[backlogAll,"Backlog","tasks pending"]].map(([v,l,s],i)=>(
          <div key={i} style={{background:"#EBE4D8",borderRadius:12,padding:"18px 20px"}}>
            <div style={{fontSize:30,fontWeight:700,fontFamily:'"Playfair Display",serif'}}>{v}</div>
            <div style={{fontSize:13,fontWeight:600,color:"#4A3F30",marginTop:2}}>{l}</div>
            <div style={{fontSize:11,color:"#9B8E80",marginTop:2}}>{s}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:"#EBE4D8",borderRadius:14,padding:"20px 22px"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#4A3F30",marginBottom:18}}>⏱ Time Allocation This Week</div>
          {Object.keys(secMins).length===0?<p style={{fontSize:12,color:"#9B8E80",fontStyle:"italic"}}>No blocks scheduled yet.</p>:(
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              {Object.entries(secMins).sort((a,b)=>b[1]-a[1]).map(([sid,mins])=>{
                const sec=byId[sid]||{color:"#9B8E80",label:sid}; const pct=Math.round(mins/totalMins*100);
                return (
                  <div key={sid}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                      <span style={{fontSize:12,fontWeight:600}}>{sec.label}</span>
                      <span style={{fontSize:11,color:"#9B8E80"}}>{(mins/60).toFixed(1)}h · {pct}%</span>
                    </div>
                    <div style={{height:9,background:"#D4C9B4",borderRadius:5,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:sec.color,borderRadius:5}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div style={{background:"#EBE4D8",borderRadius:14,padding:"20px 22px"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#4A3F30",marginBottom:18}}>📋 Task Status by Section</div>
          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            {boardSecs.map(sec=>{
              const st=tasks.filter(t=>t.sectionId===sec.id&&t.type!=="spacer");
              const tw=st.filter(t=>t.status==="this-week").length;
              const bl=st.filter(t=>t.status==="backlog").length;
              const done=completedTW.filter(t=>t.sectionId===sec.id).length;
              if(bl+tw+done===0) return null;
              return (
                <div key={sec.id} style={{display:"flex",alignItems:"center",gap:10}}>
                  <Dot color={sec.color} size={9}/>
                  <span style={{fontSize:12,fontWeight:600,flex:1}}>{sec.label}</span>
                  <div style={{display:"flex",gap:4}}>
                    {tw>0  &&<Badge bg="#E6E3F5" fg="#4B3FC7">{tw} active</Badge>}
                    {done>0&&<Badge bg="#D4F0E0" fg="#1A7A43">{done} done</Badge>}
                    {bl>0  &&<Badge bg="#E8E0D4" fg="#9B8E80">{bl} backlog</Badge>}
                  </div>
                </div>
              );
            }).filter(Boolean)}
          </div>
          {compRate!==null&&(
            <div style={{marginTop:22,paddingTop:16,borderTop:"1px solid #D4C9B4"}}>
              <Cap>Weekly Completion Rate</Cap>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1,height:12,background:"#D4C9B4",borderRadius:6,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${compRate}%`,background:"linear-gradient(90deg,#1A7A43,#4B3FC7)",borderRadius:6}}/>
                </div>
                <span style={{fontSize:16,fontWeight:700,flexShrink:0}}>{compRate}%</span>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Settings Modal ───────────────────────────────────────────────────────────

function SettingsModal({sections,setSections,onClose,checkForUpdate}) {
  const [tab,        setTab]      = useState("sections");
  const [local,      setLocal]    = useState(sections.map(s=>({...s})));
  const [newLabel,   setNewLabel] = useState("");
  const [newColor,   setNewColor] = useState("#2A7A8A");
  const [appVer,     setAppVer]   = useState(null);
  const [checkState, setCheckState] = useState(null); // null | "checking" | {status,version?,message?}

  useEffect(()=>{
    try {
      window.__TAURI__.app.getVersion()
        .then(v=>setAppVer(v))
        .catch(()=>setAppVer(null));
    } catch { setAppVer(null); }
  },[]);

  function save()       { setSections(local); onClose(); }
  function remove(id)   { setLocal(l=>l.filter(s=>s.id!==id)); }
  function upd(id,u)    { setLocal(l=>l.map(s=>s.id===id?{...s,...u}:s)); }
  function addSection() { if(!newLabel.trim()) return; setLocal(l=>[...l,{id:uid(),label:newLabel.trim(),color:newColor}]); setNewLabel(""); setNewColor("#2A7A8A"); }

  const TABS=[["sections","Sections"],["app","App"]];

  return (
    <Overlay onClose={onClose} width={560}>
      {/* Header */}
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:'"Playfair Display",serif',fontSize:20,fontWeight:700}}>Settings</div>
      </div>

      {/* Tab bar */}
      <div style={{display:"flex",gap:2,background:"#EBE4D8",borderRadius:9,padding:3,marginBottom:22,width:"fit-content"}}>
        {TABS.map(([key,label])=>(
          <button key={key} onClick={()=>setTab(key)} style={{padding:"5px 18px",borderRadius:7,border:"none",fontSize:12,fontWeight:600,background:tab===key?"#FDFAF6":"transparent",color:tab===key?"#1C1714":"#7A6C5E",boxShadow:tab===key?"0 1px 4px rgba(0,0,0,0.1)":"none",transition:"all 0.15s"}}>{label}</button>
        ))}
      </div>

      {/* ── Sections tab */}
      {tab==="sections"&&(<>
        <p style={{fontSize:12,color:"#9B8E80",marginBottom:18,lineHeight:1.5}}>Add, rename, or recolour sections. Removing a section won't delete its tasks or notes.</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:22}}>
          {local.map(s=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,background:"#F3EDE3",borderRadius:10,padding:"10px 12px"}}>
              <div style={{position:"relative",flexShrink:0}}>
                <div style={{width:26,height:26,borderRadius:6,background:s.color,border:"2px solid rgba(0,0,0,0.12)",cursor:"pointer"}} onClick={()=>document.getElementById("cp-"+s.id)?.click()}/>
                <input id={"cp-"+s.id} type="color" value={s.color} onChange={e=>upd(s.id,{color:e.target.value})} style={{position:"absolute",opacity:0,width:1,height:1,top:0,left:0,pointerEvents:"none"}}/>
              </div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap",maxWidth:112}}>
                {PRESET_COLORS.map(c=><div key={c} onClick={()=>upd(s.id,{color:c})} style={{width:14,height:14,borderRadius:3,background:c,cursor:"pointer",border:s.color===c?"2px solid #1C1714":"2px solid transparent"}}/>)}
              </div>
              <input value={s.label} onChange={e=>upd(s.id,{label:e.target.value})} style={{...S.input,marginBottom:0,flex:1,padding:"6px 10px"}}/>
              <button onClick={()=>remove(s.id)} style={{...S.btnMicro,background:"#FAE0E0",color:"#C43A3A",flexShrink:0}}>✕</button>
            </div>
          ))}
        </div>
        <div style={{background:"#EBE4D8",borderRadius:12,padding:"16px",marginBottom:22}}>
          <Cap>Add New Section</Cap>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
            <div style={{position:"relative",flexShrink:0}}>
              <div style={{width:34,height:34,borderRadius:8,background:newColor,border:"2px solid rgba(0,0,0,0.1)",cursor:"pointer"}} onClick={()=>document.getElementById("cp-new")?.click()}/>
              <input id="cp-new" type="color" value={newColor} onChange={e=>setNewColor(e.target.value)} style={{position:"absolute",opacity:0,width:1,height:1,top:0,left:0,pointerEvents:"none"}}/>
            </div>
            <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Section name…" style={{...S.input,marginBottom:0,flex:1}} onKeyDown={e=>e.key==="Enter"&&addSection()}/>
            <button onClick={addSection} style={{...S.btnDark,flexShrink:0}}>Add</button>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {PRESET_COLORS.map(c=><div key={c} onClick={()=>setNewColor(c)} style={{width:18,height:18,borderRadius:4,background:c,cursor:"pointer",border:newColor===c?"2px solid #1C1714":"2px solid transparent"}}/>)}
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={save} style={S.btnDark}>Save Changes</button>
          <button onClick={onClose} style={S.btnGhost}>Cancel</button>
        </div>
      </>)}

      {/* ── App tab */}
      {tab==="app"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <AutostartToggle/>

          {/* Update checker */}
          <div style={{background:"#F3EDE3",borderRadius:9,border:"1px solid #E3D9CC",padding:"12px 14px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
              <div style={{fontSize:12,fontWeight:600,color:"#1C1714"}}>Software Update</div>
              <button
                onClick={async()=>{
                  setCheckState("checking");
                  await checkForUpdate(r=>setCheckState(r));
                }}
                disabled={checkState==="checking" || !checkForUpdate}
                style={{...S.btnDark,fontSize:11,padding:"5px 14px",flexShrink:0}}
              >{checkState==="checking" ? "Checking…" : "Check for Updates"}</button>
            </div>
            {checkState && checkState !== "checking" && (
              <div style={{marginTop:10,fontSize:11,lineHeight:1.5,padding:"8px 10px",borderRadius:7,
                background: checkState.status==="error"   ? "#FAE0E0"
                          : checkState.status==="available"? "#D4F0E0"
                          : "#EBE4D8",
                color:      checkState.status==="error"   ? "#C43A3A"
                          : checkState.status==="available"? "#1A7A43"
                          : "#6B5E4E"
              }}>
                {checkState.status==="latest"    && "✓  You're on the latest version."}
                {checkState.status==="skipped"   && "Update available but marked as skipped. Clear the skipped version to see it again."}
                {checkState.status==="available" && `⬆  v${checkState.version} is available — check for the update dialog.`}
                {checkState.status==="error"     && `Error: ${checkState.message}`}
              </div>
            )}
          </div>

          <div style={{textAlign:"center",color:"#C2B49E",fontSize:11}}>
            {appVer ? `Progress You  ·  v${appVer}` : "Progress You  ·  Dev build"}
          </div>
        </div>
      )}
    </Overlay>
  );
}

// ─── Update Dialog ────────────────────────────────────────────────────────────

function UpdateDialog({info,onSkip,onRemind}) {

  const [phase,setPhase]=useState("idle"); // idle | downloading | done | error
  const [errMsg,setErrMsg]=useState("");

  async function handleUpdate() {
    setPhase("downloading");
    try {
      await window.__TAURI__.core.invoke('install_update');
      setPhase("done"); // app will restart automatically; this is a fallback
    } catch(e) {
      setErrMsg(e?.toString()||"Unknown error");
      setPhase("error");
    }
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(28,23,20,0.72)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}}>
      <div style={{background:"#FDFAF6",borderRadius:14,width:480,maxWidth:"100%",boxShadow:"0 28px 72px rgba(0,0,0,0.42)",border:"1px solid #E3D9CC",overflow:"hidden"}}>

        {/* Header */}
        <div style={{background:"#1C1714",padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>⬆</span>
          <span style={{fontFamily:'"Playfair Display",serif',fontSize:16,fontWeight:700,color:"#F8F3EC"}}>Update Available</span>
          <span style={{marginLeft:"auto",background:"#4B3FC7",color:"#fff",borderRadius:20,padding:"3px 11px",fontSize:12,fontWeight:700}}>v{info.version}</span>
        </div>

        <div style={{padding:"20px"}}>
          {/* Changelog */}
          {info.notes && (
            <div style={{background:"#F3EDE3",borderRadius:10,padding:"14px 16px",marginBottom:18,maxHeight:220,overflowY:"auto"}}>
              <div style={{fontSize:10,fontWeight:700,color:"#7A6C5E",letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:8}}>What's new</div>
              <pre style={{fontSize:12,color:"#4A3F30",lineHeight:1.6,whiteSpace:"pre-wrap",fontFamily:'"DM Sans",sans-serif',margin:0}}>{info.notes}</pre>
            </div>
          )}

          {/* State-based body */}
          {phase==="idle"&&(
            <>
              <p style={{fontSize:13,color:"#6B5E4E",marginBottom:18,lineHeight:1.5}}>A new version of Progress You is ready to install. The app will restart automatically after updating.</p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={handleUpdate} style={{...S.btnDark,flex:1}}>⬆ Update Now</button>
                <button onClick={onRemind}     style={S.btnGhost}>Remind Next Launch</button>
                <button onClick={onSkip}       style={{...S.btnGhost,borderColor:"#F1A0A0",color:"#C43A3A"}}>Skip This Version</button>
              </div>
            </>
          )}
          {phase==="downloading"&&(
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div style={{fontSize:22,marginBottom:10}}>⏳</div>
              <div style={{fontSize:13,fontWeight:600,color:"#4A3F30"}}>Downloading update…</div>
              <div style={{fontSize:12,color:"#9B8E80",marginTop:5}}>The app will restart automatically when ready.</div>
            </div>
          )}
          {phase==="done"&&(
            <div style={{textAlign:"center",padding:"16px 0"}}>
              <div style={{fontSize:22,marginBottom:10}}>✓</div>
              <div style={{fontSize:13,fontWeight:600,color:"#1A7A43"}}>Update installed — restarting…</div>
            </div>
          )}
          {phase==="error"&&(
            <>
              <div style={{background:"#FAE0E0",borderRadius:9,padding:"12px 14px",marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:700,color:"#C43A3A",marginBottom:4}}>Update failed</div>
                <div style={{fontSize:11,color:"#6B5E4E"}}>{errMsg}</div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setPhase("idle")} style={S.btnDark}>Try Again</button>
                <button onClick={onRemind} style={S.btnGhost}>Later</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── App Dialog (replaces window.alert / window.confirm) ─────────────────────

function AppDialog({dialog,onClose}) {
  if(!dialog) return null;
  const isConfirm=!!dialog.onConfirm;
  return (
    <div onClick={isConfirm?null:onClose} style={{position:"fixed",inset:0,background:"rgba(28,23,20,0.72)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#FDFAF6",borderRadius:14,padding:"26px 28px",width:400,maxWidth:"100%",boxShadow:"0 28px 72px rgba(0,0,0,0.42)",border:"1px solid #E3D9CC"}}>
        <div style={{fontFamily:'"Playfair Display",serif',fontSize:17,fontWeight:700,marginBottom:dialog.detail?8:18,color:"#1C1714"}}>{dialog.message}</div>
        {dialog.detail&&<p style={{fontSize:13,color:"#6B5E4E",lineHeight:1.55,marginBottom:20}}>{dialog.detail}</p>}
        <div style={{display:"flex",gap:8}}>
          {isConfirm&&<button onClick={dialog.onConfirm} style={{...S.btnDark,flex:1}}>{dialog.confirmLabel||"Confirm"}</button>}
          <button onClick={onClose} style={{...S.btnGhost,flex:isConfirm?0:1}}>{isConfirm?"Cancel":"OK"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── Micro components ─────────────────────────────────────────────────────────

function Dot({color,size=9})     { return <div style={{width:size,height:size,borderRadius:"50%",background:color,flexShrink:0}}/>; }
function Badge({bg,fg,children}) { return <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:bg,color:fg,fontWeight:700}}>{children}</span>; }
function Cap({children})         { return <div style={{fontWeight:700,fontSize:11,color:"#7A6C5E",letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:10}}>{children}</div>; }
function AutostartToggle() {
  const [enabled, setEnabled] = React.useState(false);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    try {
      window.__TAURI__.autostart.isEnabled()
        .then(v => { setEnabled(v); setLoading(false); })
        .catch(() => setLoading(false));
    } catch { setLoading(false); }
  }, []);

  async function toggle() {
    if (!window.__TAURI__?.autostart) return;
    if (enabled) {
      await window.__TAURI__.autostart.disable();
    } else {
      await window.__TAURI__.autostart.enable();
    }
    setEnabled(v => !v);
  }

  if (loading) return null;
  
  // Dev server has a port (e.g. http://localhost:1420).
  // Production is served from http://tauri.localhost with no port.
  const isDev = !!window.location.port;
  if (isDev) return (
    <div style={{padding:"10px 12px",background:"#F3EDE3",borderRadius:9,border:"1px solid #E3D9CC",fontSize:12,color:"#9B8E80"}}>
      Launch on startup — not available in dev mode
    </div>
  );

  return (
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:"#F3EDE3",borderRadius:9,border:"1px solid #E3D9CC"}}>
      <button onClick={toggle} style={{width:18,height:18,borderRadius:4,border:`2px solid ${enabled?"#1A7A43":"#C2B49E"}`,background:enabled?"#1A7A43":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff"}}>
        {enabled?"✓":""}
      </button>
      <div>
        <div style={{fontSize:12,fontWeight:600,color:"#1C1714"}}>Launch on startup</div>
        <div style={{fontSize:11,color:"#9B8E80"}}>Start minimised to tray when you log in</div>
      </div>
    </div>
  );
}
function Pill({active,onClick,children}) {
  return <button onClick={onClick} style={{padding:"5px 14px",borderRadius:20,fontSize:11,fontWeight:600,border:active?"2px solid #1C1714":"1.5px solid #D6CEC3",background:active?"#1C1714":"transparent",color:active?"#F8F3EC":"#6B5E4E"}}>{children}</button>;
}
function Empty({icon,text,sub}) {
  return (
    <div style={{background:"#EBE4D8",borderRadius:14,padding:"36px 28px",textAlign:"center"}}>
      <div style={{fontSize:32,marginBottom:10}}>{icon}</div>
      <div style={{fontSize:14,fontWeight:600,color:"#4A3F30"}}>{text}</div>
      {sub&&<div style={{fontSize:12,color:"#9B8E80",marginTop:6}}>{sub}</div>}
    </div>
  );
}
function Overlay({onClose,children,width=420}) {
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(28,23,20,0.68)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#FDFAF6",borderRadius:14,padding:"26px 28px",width,maxWidth:"100%",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 28px 72px rgba(0,0,0,0.42)",border:"1px solid #E3D9CC"}}>
        {children}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
