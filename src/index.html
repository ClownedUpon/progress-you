    // Resilient script loader: tries local vendor/ first, falls back to CDN in dev
    function loadScript(localPath, cdnUrl) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = localPath;
        s.onload = resolve;
        s.onerror = function() {
          console.warn('Local load failed for ' + localPath + ', trying CDN fallback…');
          var c = document.createElement('script');
          c.src = cdnUrl;
          c.onload = resolve;
          c.onerror = function() {
            reject(new Error('Failed to load: ' + localPath + ' (and CDN fallback)'));
          };
          document.head.appendChild(c);
        };
        document.head.appendChild(s);
      });
    }
    (async function() {
      try {
        await loadScript('./vendor/react.production.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js');
        await loadScript('./vendor/react-dom.production.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js');
        await loadScript('./vendor/babel.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js');
        // All loaded — now run the app script
        var appScript = document.getElementById('app-source');
        if (appScript && window.Babel) {
          var code = window.Babel.transform(appScript.textContent, { presets: ['env', 'react'] }).code;
          var run = document.createElement('script');
          run.textContent = code;
          document.body.appendChild(run);
        }
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:40px">' +
          '<div style="text-align:center;max-width:480px">' +

          '<h1 style="font-size:20px;margin-bottom:10px">Failed to load core libraries</h1>' +
          '<p style="color:#666;line-height:1.6;margin-bottom:16px">Make sure the <code>src/vendor/</code> folder exists with react.production.min.js, react-dom.production.min.js, and babel.min.js.</p>' +
          '<pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:11px;text-align:left;overflow:auto">' + e.message + '</pre>' +
          '</div></div>';
      }
    })();
  </script>

const uid = () => {
  const buf = new Uint8Array(10);
  crypto.getRandomValues(buf);
  const chars = "0123456789abcdefghijklmnopqrstuvwxyz";
  let s = "";
  for (let i = 0; i < 10; i++) s += chars[buf[i] % 36];
  return s;
};

function textFor(hex="#888") {
  if(!hex||hex.length<7) return "#fff";
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 0.299*r+0.587*g+0.114*b>145?"#1C1714":"#FFFFFF";
}
function mondayOf(date) {
  const d=new Date(date); d.setHours(12,0,0,0);
  const day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1));
  return [d.getFullYear(),String(d.getMonth()+1).padStart(2,"0"),String(d.getDate()).padStart(2,"0")].join("-");
}
function shiftWeek(wk,n) {
  const [y,m,d]=wk.split("-").map(Number);
  const dt=new Date(y,m-1,d,12,0,0); dt.setDate(dt.getDate()+n*7);
  return mondayOf(dt);
}
function weekLabel(wk) {
  const [y,m,d]=wk.split("-").map(Number);
  const s=new Date(y,m-1,d),e=new Date(y,m-1,d+6);
  const fmt=(dt,yr)=>dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",...(yr?{year:"numeric"}:{})});
  return `${fmt(s)} – ${fmt(e,true)}`;
}
function monthKeyOf(ts) {
  const d=new Date(ts);
  return [d.getFullYear(),String(d.getMonth()+1).padStart(2,"0")].join("-");
}
function fmtMonth(mk) {
  const [y,m]=mk.split("-").map(Number);
  return new Date(y,m-1,1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});
}
function blockMins(blk) {
  const [sh,sm]=blk.start.split(":").map(Number);
  const [eh,em]=blk.end.split(":").map(Number);
  return Math.max(0,(eh*60+em)-(sh*60+sm));
}
function weekDayToISO(wk,dayName) {
  const di=DAYS.indexOf(dayName); if(di<0) return wk;
  const [y,m,d]=wk.split("-").map(Number);
  const dt=new Date(y,m-1,d+di,12,0,0);
  return dt.toISOString().slice(0,10);
}
function stripHtmlText(html) { return (html||"").replace(/<[^>]*>/g,"").trim(); }
function todayName()   { return new Date().toLocaleDateString("en-GB",{weekday:"long"}); }
function nowStamp()    { return new Date().toISOString().slice(0,16).replace("T","_").replace(":","-"); }
function todayISO()    { return new Date().toISOString().slice(0,10); }
function addDays(iso,n){ const d=new Date(iso+"T12:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function dayIndex(iso){ const d=new Date(iso+"T12:00:00"); return (d.getDay()+6)%7; } // Monday=0
function trackerStreak(trk) {
  // Counts consecutive *scheduled* completions, skipping non-active days
  let streak=0; const d=new Date(todayISO()+"T12:00:00");
  for(let i=0;i<366;i++){
    const iso=d.toISOString().slice(0,10); const di=(d.getDay()+6)%7;
    if(trk.activeDays[di]){
      if(trk.completions[iso]) streak++;
      else if(iso===todayISO()) { /* today not yet done — don't break, just skip */ }
      else break;
    }
    // non-active days are simply skipped (not counted, not breaking)
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function fmtDue(iso, dueTime=null, allDay=true) {
  const today=todayISO(), diff=Math.round((new Date(iso+"T12:00:00")-new Date(today+"T12:00:00"))/(1000*60*60*24));
  const d=new Date(iso+"T12:00:00");
  const timeSuffix=(!allDay&&dueTime)?" · "+dueTime:"";
  if(diff<0)  return { label:`${Math.abs(diff)}d overdue`+timeSuffix, urgent:true };
  if(diff===0)return { label:"Due today"+timeSuffix, urgent:true };
  if(diff===1)return { label:"Due tomorrow"+timeSuffix, urgent:false };
  return { label:"Due "+d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})+timeSuffix, urgent:false };
}

function noteChildren(items,parentId) {
  return items.filter(n=>n.parentId===(parentId||null)).sort((a,b)=>a.order-b.order);
}
function noteDescendants(items,id) {
  const children=items.filter(n=>n.parentId===id);
  return children.flatMap(c=>[c.id,...noteDescendants(items,c.id)]);
}

// ─── Storage ──────────────────────────────────────────────────────────────────

async function sget(k) {
  if (!window.__TAURI__?.fs) return null;
  try {
    const { exists, readTextFile, BaseDirectory } = window.__TAURI__.fs;
    const found = await exists(k + ".json", { baseDir: BaseDirectory.AppData });
    if (!found) return null;
    const text = await readTextFile(k + ".json", { baseDir: BaseDirectory.AppData });
    return JSON.parse(text);
  } catch { return null; }
}

async function sset(k, v) {
  if (!window.__TAURI__?.fs) return;
  try {
    const { writeTextFile, BaseDirectory } = window.__TAURI__.fs;
    await writeTextFile(k + ".json", JSON.stringify(v), { baseDir: BaseDirectory.AppData });
  } catch(e) { console.error("sset error:", e); }
}

// Debounced write — coalesces rapid state changes into one disk write per key
const _ssetTimers = {};
function ssetDebounced(k, v, delay=800) {
  if (_ssetTimers[k]) clearTimeout(_ssetTimers[k]);
  _ssetTimers[k] = setTimeout(() => { _ssetTimers[k] = null; sset(k, v); }, delay);
}

// ─── Automatic backup ─────────────────────────────────────────────────────────

const BACKUP_KEYS = ["py-sections","py-tt","py-tasks","py-notes","py-tt-templates","py-tt-setblocks","py-tt-archive","py-trackers"];
const DEFAULT_BACKUP_HOURS = 24;

async function getBackupInterval() {
  const val = await sget("py-backup-interval");
  if (val && typeof val === "number" && val >= 1 && val <= 168) return val;
  return DEFAULT_BACKUP_HOURS;
}
async function setBackupInterval(hours) {
  await sset("py-backup-interval", Math.max(1, Math.min(168, hours)));
}

async function runBackupIfDue(force) {
  if (!window.__TAURI__?.fs) return;
  try {
    const { exists, readTextFile, writeTextFile, mkdir, BaseDirectory } = window.__TAURI__.fs;
    const intervalHrs = await getBackupInterval();
    const metaFound = await exists("py-backup-meta.json", { baseDir: BaseDirectory.AppData });
    let lastBackup = 0;
    if (metaFound) {
      const raw = await readTextFile("py-backup-meta.json", { baseDir: BaseDirectory.AppData });
      const meta = JSON.parse(raw);
      lastBackup = meta.lastBackup || 0;
    }
    const now = Date.now();
    if (!force && now - lastBackup < intervalHrs * 3600000) return; // not due yet
    await mkdir("backups", { baseDir: BaseDirectory.AppData, recursive: true });
    const stamp = new Date().toISOString().slice(0,19).replace(/[T:]/g, "-");
    for (const key of BACKUP_KEYS) {
      const found = await exists(key + ".json", { baseDir: BaseDirectory.AppData });
      if (!found) continue;
      const text = await readTextFile(key + ".json", { baseDir: BaseDirectory.AppData });
      await writeTextFile("backups/" + key + "_" + stamp + ".json", text, { baseDir: BaseDirectory.AppData });
    }
    await writeTextFile("py-backup-meta.json", JSON.stringify({ lastBackup: now, stamp }), { baseDir: BaseDirectory.AppData });
    // Prune old backups — keep only the 10 most recent sets
    await pruneOldBackups();
  } catch(e) { console.error("Backup error:", e); }
}

async function pruneOldBackups() {
  if (!window.__TAURI__?.fs) return;
  try {
    const { readDir, remove, BaseDirectory } = window.__TAURI__.fs;
    const entries = await readDir("backups", { baseDir: BaseDirectory.AppData });
    // Extract unique timestamps from filenames
    const stamps = [...new Set(entries.map(e => {
      const name = e.name || "";
      const match = name.match(/_(\d{4}-\d{2}-\d{2}-\d{2}-\d{2}-\d{2})\.json$/);
      return match ? match[1] : null;
    }).filter(Boolean))].sort().reverse();
    // Keep 10 newest sets, delete the rest
    const toDelete = stamps.slice(10);
    for (const entry of entries) {
      const name = entry.name || "";
      if (toDelete.some(s => name.includes(s))) {
        try { await remove("backups/" + name, { baseDir: BaseDirectory.AppData }); } catch(e) {}
      }
    }
  } catch(e) {}
}

// ─── Data migration (fills missing fields on existing records) ───────────────

function migrateTt(tt) {
  if(!tt||typeof tt!=="object") return tt||{};
  const out={};
  for(const [wk,week] of Object.entries(tt)){
    out[wk]={};
    for(const [day,arr] of Object.entries(week)){
      out[wk][day]=(Array.isArray(arr)?arr:[]).map(blk=>{
        if(blk.linkedItems) return blk; // already migrated
        const items=[];
        if(blk.linkedTaskId) items.push({type:"task",id:blk.linkedTaskId,snapshot:blk.linkedTaskSnapshot||""});
        if(blk.linkedNoteId) items.push({type:"note",id:blk.linkedNoteId,snapshot:blk.linkedNoteSnapshot||""});
        const {linkedTaskId,linkedNoteId,linkedTaskSnapshot,linkedNoteSnapshot,...rest}=blk;
        return{...rest,linkedItems:items};
      });
    }
  }
  return out;
}

// Prune timetable weeks older than 6 months; archive them to a separate file
const TT_PRUNE_MONTHS = 6;
async function pruneTt(tt) {
  if (!tt || typeof tt !== "object") return tt || {};
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - TT_PRUNE_MONTHS);
  const cutoffStr = mondayOf(cutoff);
  const keep = {};
  const archive = {};
  let pruned = 0;
  for (const [wk, week] of Object.entries(tt)) {
    if (wk < cutoffStr) {
      // Only archive weeks that actually have blocks
      const hasData = Object.values(week).some(arr => Array.isArray(arr) && arr.length > 0);
      if (hasData) { archive[wk] = week; pruned++; }
    } else {
      keep[wk] = week;
    }
  }
  if (pruned > 0) {
    // Merge with existing archive
    const existing = await sget("py-tt-archive") || {};
    const merged = { ...existing, ...archive };
    await sset("py-tt-archive", merged);
    console.log("Timetable pruned: archived " + pruned + " old week(s)");
  }
  return keep;
}

function migrateTasks(tasks) {

}

// ─── Error Boundary ──────────────────────────────────────────────────────────

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, errorInfo) { this.setState({ errorInfo }); console.error("ErrorBoundary caught:", error, errorInfo); }
  render() {
    if (this.state.hasError) {
      const errMsg = this.state.error ? this.state.error.toString() : "Unknown error";
      const stack = this.state.errorInfo ? this.state.errorInfo.componentStack : "";
      return React.createElement("div", {
        style: {
          minHeight: "100vh", background: "#F8F3EC", display: "flex", alignItems: "center",
          justifyContent: "center", padding: 40, fontFamily: '"DM Sans", sans-serif'
        }
      },
        React.createElement("div", {
          style: {
            background: "#FDFAF6", borderRadius: 16, padding: "36px 40px", maxWidth: 560,
            width: "100%", boxShadow: "0 8px 32px rgba(0,0,0,0.12)", border: "1px solid #E3D9CC",
            textAlign: "center"
          }
        },
          React.createElement("div", { style: { fontSize: 36, marginBottom: 14 } }, "\u26A0"),
          React.createElement("h1", {
            style: { fontFamily: '"Playfair Display", serif', fontSize: 22, fontWeight: 700,
              color: "#1C1714", marginBottom: 10 }
          }, "Something went wrong"),
          React.createElement("p", {
            style: { fontSize: 13, color: "#6B5E4E", lineHeight: 1.6, marginBottom: 20 }
          }, "Your data is safe \u2014 it\u2019s stored separately and has not been affected. Try refreshing the app to continue."),
          React.createElement("div", {
            style: {
              background: "#F3EDE3", borderRadius: 10, padding: "14px 16px", marginBottom: 20,
              textAlign: "left", maxHeight: 160, overflowY: "auto", border: "1px solid #E3D9CC"
            }
          },
            React.createElement("div", {
              style: { fontSize: 10, fontWeight: 700, color: "#7A6C5E", letterSpacing: "0.6px",
                textTransform: "uppercase", marginBottom: 6 }
            }, "Error Details"),
            React.createElement("pre", {
              style: { fontSize: 11, color: "#C43A3A", fontFamily: '"JetBrains Mono", monospace',
                whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0 }
            }, errMsg),
            stack ? React.createElement("pre", {
              style: { fontSize: 10, color: "#9B8E80", fontFamily: '"JetBrains Mono", monospace',
                whiteSpace: "pre-wrap", wordBreak: "break-word", margin: "8px 0 0", maxHeight: 80, overflowY: "auto" }
            }, stack.trim()) : null
          ),
          React.createElement("button", {
            onClick: () => window.location.reload(),
            style: {
              padding: "10px 28px", borderRadius: 8, border: "none", cursor: "pointer",
              background: "#1C1714", color: "#F8F3EC", fontFamily: '"DM Sans", sans-serif',
              fontSize: 13, fontWeight: 600
            }
          }, "Refresh App")
        )
      );
    }
    return this.props.children;
  }
}

  // ── Undo system — tracks last 5 destructive actions
  function pushUndo(title,detail,undoFn){
    const id=uid();
    setUndoStack(prev=>[{id,title,detail,undoFn},...prev].slice(0,5));
    undoTimers.current[id]=setTimeout(()=>{
      setUndoStack(prev=>prev.filter(u=>u.id!==id));
      delete undoTimers.current[id];
    },5000);
  }
  function executeUndo(id){
    setUndoStack(prev=>{
      const entry=prev.find(u=>u.id===id);
      if(entry){ entry.undoFn(); clearTimeout(undoTimers.current[id]); delete undoTimers.current[id]; }
      return prev.filter(u=>u.id!==id);
    });
  }
  function dismissUndo(id){
    clearTimeout(undoTimers.current[id]); delete undoTimers.current[id];
    setUndoStack(prev=>prev.filter(u=>u.id!==id));
  }

  // ── Reminder engine — polls every 30s
  const [toasts, setToasts] = useState([]); // in-app fallback banners
  function fireReminder(title, body){
    // Native notification via Tauri invoke command
    try{ window.__TAURI__?.core?.invoke("fire_notification",{title,body,appName:"Progress You"}); }catch(e){}
    // In-app toast banner (always shown as confirmation)
    const id=uid();
    setToasts(p=>[...p,{id,title,body}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),6000);
  }
  useEffect(()=>{
    function checkReminders(){
      const now=new Date();
      setTasks(prev=>{
        let changed=false;
        const next=prev.map(t=>{
          if(!t.remindAt||t.remindFired||new Date(t.remindAt)>now) return t;
          changed=true;
          fireReminder("Task reminder",t.title);
          return{...t,remindFired:true};
        });
        return changed?next:prev;
      });
      setNotes(prev=>{
        let changed=false;
        const next={};
        for(const [sid,arr] of Object.entries(prev)){
          next[sid]=(Array.isArray(arr)?arr:[]).map(n=>{
            if(!n.remindAt||n.remindFired||new Date(n.remindAt)>now) return n;
            changed=true;
            fireReminder("Note reminder",n.title);
            return{...n,remindFired:true};
          });
        }
        return changed?next:prev;
      });
    }
    const id=setInterval(checkReminders,15000);
    return()=>clearInterval(id);
  },[]);

  // ── Timetable ops
  const getDayBlocks=day=>[...((tt[week]||{})[day]||[])].sort((a,b)=>a.start.localeCompare(b.start));
  function upsertBlock(day,blk,insertBeforeId=null){
    setTt(prev=>{
      const w={...(prev[week]||{})},arr=[...(w[day]||[])];
      const i=arr.findIndex(b=>b.id===blk.id);
      if(i>=0){ arr[i]=blk; }
      else if(insertBeforeId){ const bi=arr.findIndex(b=>b.id===insertBeforeId); arr.splice(bi>=0?bi:arr.length,0,blk); }
      else arr.push(blk);
      return{...prev,[week]:{...w,[day]:arr}};
    });
  }
  function deleteBlock(day,id){
    const blocks=(tt[week]||{})[day]||[];
    const block=blocks.find(b=>b.id===id);
    const capturedWeek=week;
    setTt(prev=>{const w={...(prev[capturedWeek]||{})};return{...prev,[capturedWeek]:{...w,[day]:(w[day]||[]).filter(b=>b.id!==id)}};});
    if(block) pushUndo("Block deleted",block.label||"Block",()=>{
      setTt(prev=>{const w={...(prev[capturedWeek]||{})};return{...prev,[capturedWeek]:{...w,[day]:[...(w[day]||[]),block]}};});
    });

      onClose:()=>setDialog(null)

  }

    setSetBlocks(p=>[...p.filter(x=>!(x.type===sb.type&&x.sectionId===sb.sectionId&&x.label===sb.label&&x.start===sb.start&&x.end===sb.end)),sb]);

  function applyTemplate(tmpl,mode){

  // ── Task ops
  function addTask(sid,title,notesT,extra={}){
    setTasks(prev=>{
      const maxOrder=prev.filter(t=>t.sectionId===sid).reduce((m,t)=>Math.max(m,t.order??0),0);
      return[{
        id:extra.id||uid(),sectionId:sid,title,notes:notesT,
        type:extra.type||"task",status:extra.status||"backlog",
        order:maxOrder+1,priority:extra.priority||"normal",
        checklist:[],linkedNoteIds:[],linkedTrackerIds:[],
        dueDate:extra.dueDate||null,dueTime:null,allDay:true,remindAt:null,remindFired:false,
        createdAt:Date.now(),completedAt:null,monthCompleted:null
      },...prev];
    });
  }
  function updateTask(id,upd){ setTasks(p=>p.map(t=>t.id===id?{...t,...upd}:t)); }
  function deleteTask(id){
    const task=tasks.find(t=>t.id===id);
    setTasks(p=>p.filter(t=>t.id!==id));
    if(task&&task.type!=="spacer") pushUndo("Task deleted",task.title,()=>setTasks(prev=>[task,...prev]));
  }
  function completeTask(id){
    const task=tasks.find(t=>t.id===id);
    const now=Date.now();
    const prev=task?{status:task.status,completedAt:task.completedAt,monthCompleted:task.monthCompleted}:null;
    updateTask(id,{status:"done",completedAt:now,monthCompleted:monthKeyOf(now)});
    if(task) pushUndo("Task completed",task.title,()=>updateTask(id,prev));
  }
  function archiveTask(id){
    const task=tasks.find(t=>t.id===id);
    updateTask(id,{archived:true});
    if(task) pushUndo("Task archived",task.title,()=>updateTask(id,{archived:false}));
  }
  function archiveDoneTasks(secId){
    const toArchive=tasks.filter(t=>t.sectionId===secId&&t.status==="done"&&!t.archived&&t.type!=="spacer");
    if(toArchive.length===0) return;
    const ids=toArchive.map(t=>t.id);
    setTasks(p=>p.map(t=>ids.includes(t.id)?{...t,archived:true}:t));
    pushUndo("Archived "+toArchive.length+" tasks",byId[secId]?.label||"section",()=>{
      setTasks(p=>p.map(t=>ids.includes(t.id)?{...t,archived:false}:t));
    });
  }
  function moveTask(dragId,beforeId,newStatus){
    setTasks(prev=>{
      const dragged=prev.find(t=>t.id===dragId); if(!dragged) return prev;
      const arr=prev.filter(t=>t.id!==dragId);
      const updated={...dragged,status:newStatus};
      if(beforeId){const idx=arr.findIndex(t=>t.id===beforeId);arr.splice(idx>=0?idx:arr.length,0,updated);}
      else arr.push(updated);
      // Renumber order within each section to persist drag positions
      const counters={};
      return arr.map(t=>{ const k=t.sectionId; counters[k]=(counters[k]??0); return{...t,order:counters[k]++}; });
    });
  }

  // ── Tracker ops
  function addTracker(title,opts={}){
    setTrackers(prev=>[{
      id:uid(),title,sectionId:opts.sectionId||null,color:opts.color||"#0C7B7B",
      activeDays:opts.activeDays||[1,1,1,1,1,0,0],completions:{},

  function updateTracker(id,upd){ setTrackers(p=>p.map(t=>t.id===id?{...t,...upd}:t)); }
  function deleteTracker(id){

  function toggleTrackerDay(id,dateISO){
    setTrackers(p=>p.map(t=>{

  function addNote(sid,parentId=null,opts={}){
    setNotes(prev=>{
      const items=prev[sid]||[];
      const siblings=items.filter(n=>n.parentId===(parentId||null));
      const order=siblings.length?Math.max(...siblings.map(n=>n.order))+1:0;
      const base=makeNote(parentId,order);
      const newNote={...base,...(opts.id?{id:opts.id}:{}),...(opts.title?{title:opts.title}:{}),...(opts.content?{content:opts.content}:{}),...(opts.linkedTrackerIds?{linkedTrackerIds:opts.linkedTrackerIds}:{})};

  // ── Import / Export
  async function exportData(opts={}){
    const payload={};
    if(opts.inclTasks){
      let ts=tasks.filter(t=>t.type!=="spacer");
      if(opts.taskSecIds?.length) ts=ts.filter(t=>opts.taskSecIds.includes(t.sectionId));
      if(opts.dateFrom) ts=ts.filter(t=>!t.createdAt||(new Date(t.createdAt)>=new Date(opts.dateFrom)));
      if(opts.dateTo)   ts=ts.filter(t=>!t.createdAt||(new Date(t.createdAt)<=new Date(opts.dateTo+"T23:59:59")));
      payload.tasks=ts;
    }
    if(opts.inclTt) payload.tt=tt;
    if(opts.inclNotes){
      if(opts.noteSecIds?.length){
        const filtered={};
        opts.noteSecIds.forEach(sid=>{ if(notes[sid]) filtered[sid]=notes[sid]; });
        payload.notes=filtered;
      } else { payload.notes=notes; }
    }
    if(opts.inclSections) payload.sections=sections;
    if(opts.inclTrackers) payload.trackers=trackers;
    const mode=opts.inclTasks&&opts.inclNotes&&opts.inclTt&&opts.inclSections&&opts.inclTrackers?"all":opts.inclSections&&!opts.inclTasks?"settings":"custom";
    payload._export={mode,exportedAt:new Date().toISOString(),version:EXPORT_VERSION};
    const json=JSON.stringify(payload,null,2);
    const filename=`progress-you_export_${nowStamp()}.json`;
    // Tauri: show native save-as dialog
    if(window.__TAURI__?.dialog?.save||window.__TAURI__?.dialog?.open){
      try{
        const lastPath=await sget("py-export-path");
        const defaultPath=(lastPath?lastPath.replace(/[^/\\]*$/,"")+filename:null)||filename;
        const savePath=await window.__TAURI__.dialog.save({
          defaultPath,
          filters:[{name:"JSON",extensions:["json"]}]
        });
        if(!savePath) return; // user cancelled
        await window.__TAURI__.fs.writeTextFile(savePath,json);
        await sset("py-export-path",savePath);
        // Toast confirmation
        const id=uid();
        const short=savePath.split(/[/\\]/).pop();
        setToasts(p=>[...p,{id,title:"Export saved",body:short}]);
        setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),5000);
        return;
      }catch(e){}
    }
    // Fallback: browser download (Babel / dev)
    const blob=new Blob([json],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    a.click(); URL.revokeObjectURL(a.href);
  }
  function importData(file){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        const mode=data._export?.mode||"all";
        const lines=[];
        if(data.tasks)    lines.push(`${data.tasks.length} tasks`);
        if(data.tt)       lines.push("timetable data");
        if(data.notes){const total=Object.values(data.notes).reduce((s,a)=>s+(Array.isArray(a)?a.length:1),0);lines.push(`${total} notes`);}
        if(data.sections) lines.push(`${data.sections.length} sections`);
        if(data.trackers) lines.push(`${data.trackers.length} trackers`);
        setDialog({
          message:`Import "${mode}" backup?`,
          detail:`This will replace: ${lines.join(", ")}. This cannot be undone.`,
          confirmLabel:"Import",
          onConfirm:()=>{
            if(data.tasks)    setTasks(data.tasks);
            if(data.tt)       setTt(data.tt);
            if(data.notes)    setNotes(data.notes);
            if(data.sections) setSections(data.sections);
            if(data.trackers) setTrackers(migrateTrackers(data.trackers));
            setDialog({message:"Import successful!",onClose:()=>setDialog(null)});
          },
          onClose:()=>setDialog(null)
        });
      }catch{ setDialog({message:"Could not read file.",detail:"Make sure it's a valid Progress You export (.json).",onClose:()=>setDialog(null)}); }
    };
    reader.readAsText(file);
  }

        {view==="trackers"  && <TrackersView  trackers={trackers} addTracker={addTracker} updateTracker={updateTracker} deleteTracker={deleteTracker} toggleTrackerDay={toggleTrackerDay} archiveTracker={archiveTracker} sections={sections} byId={byId} tasks={tasks} notes={notes} addTask={addTask} addNote={addNote} linkTrackerToTask={linkTrackerToTask} unlinkTrackerFromTask={unlinkTrackerFromTask} linkTrackerToNote={linkTrackerToNote} unlinkTrackerFromNote={unlinkTrackerFromNote}/>}

      {/* Toast banners (reminders + undo) */}
      <div style={{position:"fixed",bottom:20,right:20,zIndex:500,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
        {toasts.map(t=>(
          <div key={t.id} style={{background:"#1C1714",color:"#F8F3EC",borderRadius:10,padding:"12px 18px",
            boxShadow:"0 8px 24px rgba(0,0,0,0.35)",minWidth:240,maxWidth:320,pointerEvents:"auto",
            animation:"slideIn 0.2s ease"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#C8A86B",letterSpacing:"0.5px",textTransform:"uppercase",marginBottom:3}}>{t.title}</div>
            <div style={{fontSize:13}}>{t.body}</div>

        ))}
        {undoStack.map(u=>(
          <div key={u.id} style={{background:"#1C1714",color:"#F8F3EC",borderRadius:10,padding:"12px 18px",
            boxShadow:"0 8px 24px rgba(0,0,0,0.35)",minWidth:260,maxWidth:340,pointerEvents:"auto",
            animation:"slideIn 0.2s ease",borderLeft:"3px solid #C8A86B"}}>

            <div style={{fontSize:12,marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.detail}</div>

      {navStack.length>0&&<NavOverlay stack={navStack} tasks={tasks} notes={notes} trackers={trackers} byId={byId} updateTask={updateTask} completeTask={completeTask} toggleTrackerDay={toggleTrackerDay} onClose={()=>setNavStack([])} onNavigateToLevel={i=>setNavStack(s=>s.slice(0,i+1))}/>}

      {showPin&&<PinOverlay tasks={tasks} tt={tt} week={week} sections={sections} byId={byId} trackers={trackers} toggleTrackerDay={toggleTrackerDay} onClose={()=>setShowPin(false)} navigateTo={navigateTo} navigateToFresh={navigateToFresh} navigateToDate={navigateToDate}/>}

// ─── Color Picker ─────────────────────────────────────────────────────────────
// Unified swatches + recent colors + custom input.
// Usage: <ColorPicker value={color} onChange={setColor}/>

function ColorPicker({value, onChange, label}) {
  const inputRef = React.useRef(null);

  // Persist last-used colors in sessionStorage
  function getRecent(){ try{ return JSON.parse(sessionStorage.getItem("py-recent-colors")||"[]"); }catch{ return []; } }
  function addRecent(c){
    const prev=getRecent().filter(x=>x!==c);
    const next=[c,...prev].slice(0,6);
    try{ sessionStorage.setItem("py-recent-colors",JSON.stringify(next)); }catch{}
  }
  const [recent, setRecent] = useState(()=>getRecent());

  function pick(c){ onChange(c); addRecent(c); setRecent(getRecent()); }

  const Swatch=({c,size=18,selected})=>(
    <div onClick={()=>pick(c)} title={c}
      style={{width:size,height:size,borderRadius:4,background:c,cursor:"pointer",flexShrink:0,
        border:selected?"2px solid #1C1714":"2px solid transparent",
        boxShadow:selected?"0 0 0 1px #fff inset":"none"}}>
    </div>
  );

  return (
    <div>
      {label&&<span style={S.lbl}>{label}</span>}
      {/* Preset swatches */}
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
        {PRESET_COLORS.map(c=><Swatch key={c} c={c} selected={c===value}/>)}
      </div>
      {/* Recent */}
      {recent.length>0&&(
        <div style={{display:"flex",gap:4,marginBottom:6,alignItems:"center"}}>
          <span style={{fontSize:9,color:"#9B8E80",textTransform:"uppercase",letterSpacing:"0.4px",flexShrink:0}}>Recent</span>
          {recent.map(c=><Swatch key={c} c={c} size={14} selected={c===value}/>)}
        </div>
      )}
      {/* Custom */}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:28,height:28,borderRadius:6,background:value,border:"2px solid rgba(0,0,0,0.15)",cursor:"pointer",flexShrink:0}}
          onClick={()=>inputRef.current?.click()}/>
        <input ref={inputRef} type="color" value={value} onChange={e=>pick(e.target.value)}
          style={{opacity:0,position:"absolute",pointerEvents:"none",width:1,height:1}}/>
        <input value={value} onChange={e=>{ if(/^#[0-9a-fA-F]{6}$/.test(e.target.value)) pick(e.target.value); }}
          placeholder="#000000" maxLength={7}
          style={{...S.input,marginBottom:0,flex:1,padding:"5px 10px",fontSize:12,fontFamily:"monospace"}}/>
      </div>
    </div>
  );
}

// ─── Time Picker ─────────────────────────────────────────────────────────────

function TimePicker({value, onChange, label}) {
  const [phase, setPhase] = useState("hour");
  const [open,  setOpen]  = useState(false);
  const [use12, setUse12] = useState(()=>{ try{ return sessionStorage.getItem("py-time-12h")==="1"; }catch{ return false; } });
  const [dropPos, setDropPos] = useState({top:0,left:0});
  const ref = React.useRef(null);
  const btnRef = React.useRef(null);
  const dropRef = React.useRef(null);

  const [hStr, mStr] = (value||"09:00").split(":");
  const curH = parseInt(hStr)||0;
  const curM = parseInt(mStr)||0;

  // Listen for 12h/24h changes from other TimePicker instances
  useEffect(()=>{
    function onStorage(e){ if(e.key==="py-time-12h") setUse12(e.newValue==="1"); }
    window.addEventListener("storage",onStorage);
    // Also listen for custom event (same-window sync)
    function onCustom(e){ setUse12(e.detail); }
    window.addEventListener("py-time-toggle",onCustom);
    return()=>{ window.removeEventListener("storage",onStorage); window.removeEventListener("py-time-toggle",onCustom); };
  },[]);

  function toggle12(){
    const v=!use12; setUse12(v);
    try{ sessionStorage.setItem("py-time-12h",v?"1":"0"); }catch{}
    window.dispatchEvent(new CustomEvent("py-time-toggle",{detail:v}));
  }

  useEffect(()=>{
    if(!open) return;
    function handler(e){
      const inRef = ref.current && ref.current.contains(e.target);
      const inDrop = dropRef.current && dropRef.current.contains(e.target);
      if(!inRef && !inDrop){ setOpen(false); setPhase("hour"); }
    }
    window.addEventListener("mousedown",handler);
    return()=>window.removeEventListener("mousedown",handler);
  },[open]);

  function pickHour(h24){ onChange(`${String(h24).padStart(2,"0")}:${String(curM).padStart(2,"0")}`); setPhase("minute"); }
  // Switch AM/PM without changing phase
  function setAmPm(wantPm){
    const h12=curH%12;
    const newH=wantPm?h12+12:h12;
    if(newH!==curH) onChange(`${String(newH).padStart(2,"0")}:${String(curM).padStart(2,"0")}`);
  }
  function pickMinute(m){ onChange(`${String(curH).padStart(2,"0")}:${String(m).padStart(2,"0")}`); setOpen(false); setPhase("hour"); }

  function displayVal(){
    if(!use12) return value||"00:00";
    const h=curH%12||12, ampm=curH<12?"AM":"PM";
    return `${h}:${String(curM).padStart(2,"0")} ${ampm}`;
  }

  function HourDial(){
    const SIZE=200, CX=100, CY=100;
    const OUTER_R=80, INNER_R=52;
    const hours=[];
    if(use12){
      // 12h: single ring of 1-12, AM/PM handled by separate buttons
      for(let h=1;h<=12;h++){
        const a=(h/12)*2*Math.PI-Math.PI/2;
        // In AM: 12=0, 1-11=1-11. In PM: 12=12, 1-11=13-23
        const isPm=curH>=12;
        const h24=h===12?(isPm?12:0):(isPm?h+12:h);
        hours.push({h24,label:String(h),x:CX+OUTER_R*Math.cos(a),y:CY+OUTER_R*Math.sin(a),ring:"outer"});
      }
    } else {
      // 24h: outer ring 1-12, inner ring 13-0 aligned (13 under 1, 14 under 2, etc.)
      for(let h=1;h<=12;h++){
        const a=(h/12)*2*Math.PI-Math.PI/2;
        hours.push({h24:h,label:String(h),x:CX+OUTER_R*Math.cos(a),y:CY+OUTER_R*Math.sin(a),ring:"outer"});
      }
      for(let h=1;h<=12;h++){
        const a=(h/12)*2*Math.PI-Math.PI/2;
        const h24=h===12?0:h+12; // 13 under 1, 14 under 2, ..., 0 under 12
        hours.push({h24,label:String(h24),x:CX+INNER_R*Math.cos(a),y:CY+INNER_R*Math.sin(a),ring:"inner"});
      }
    }
    const centerLabel=use12?`${curH%12||12}:${String(curM).padStart(2,"0")} ${curH<12?"AM":"PM"}`:`${String(curH).padStart(2,"0")}:${String(curM).padStart(2,"0")}`;
    return (
      <svg width={SIZE} height={SIZE} style={{display:"block",margin:"0 auto",cursor:"pointer"}}>
        <circle cx={CX} cy={CY} r={92} fill="#F3EDE3" stroke="#E3D9CC" strokeWidth={1}/>
        {hours.map(({h24,label,x,y,ring})=>{
          const sel=h24===curH;
          return (
            <g key={h24+"-"+ring} onClick={()=>pickHour(h24)}>
              <circle cx={x} cy={y} r={ring==="outer"?18:15} fill={sel?"#1C1714":"transparent"} stroke="none"/>
              <text x={x} y={y} textAnchor="middle" dominantBaseline="central"
                fontSize={ring==="outer"?13:11} fontWeight={sel?700:500}
                fill={sel?"#F8F3EC":"#4A3F30"} fontFamily='"DM Sans",sans-serif'>{label}</text>
            </g>
          );
        })}
        <text x={CX} y={CY} textAnchor="middle" dominantBaseline="central"
          fontSize={use12?11:10} fill="#9B8E80" fontFamily='"DM Sans",sans-serif'>{centerLabel}</text>
      </svg>
    );
  }

  function MinuteDial(){
    const SIZE=200, CX=100, CY=100, R=78;
    const mins=[0,5,10,15,20,25,30,35,40,45,50,55];
    return (
      <svg width={SIZE} height={SIZE} style={{display:"block",margin:"0 auto",cursor:"pointer"}}>
        <circle cx={CX} cy={CY} r={92} fill="#F3EDE3" stroke="#E3D9CC" strokeWidth={1}/>
        {mins.map((m,i)=>{
          const a=(i/12)*2*Math.PI-Math.PI/2;
          const x=CX+R*Math.cos(a), y=CY+R*Math.sin(a), sel=m===curM;
          return (
            <g key={m} onClick={()=>pickMinute(m)}>
              <circle cx={x} cy={y} r={18} fill={sel?"#1C1714":"transparent"} stroke="none"/>
              <text x={x} y={y} textAnchor="middle" dominantBaseline="central"
                fontSize={12} fontWeight={sel?700:500}
                fill={sel?"#F8F3EC":"#4A3F30"} fontFamily='"DM Sans",sans-serif'>
                :{String(m).padStart(2,"0")}
              </text>
            </g>
          );
        })}
        <text x={CX} y={CY} textAnchor="middle" dominantBaseline="central"
          fontSize={10} fill="#9B8E80" fontFamily='"DM Sans",sans-serif'>
          {String(curH).padStart(2,"0")}:{String(curM).padStart(2,"0")}
        </text>
      </svg>
    );
  }

  return (
    <div ref={ref} style={{position:"relative",flex:1}}>
      {label&&<span style={S.lbl}>{label}</span>}
      <button ref={btnRef} onClick={()=>{
          if(!open && btnRef.current){
            const r=btnRef.current.getBoundingClientRect();
            const spaceBelow=window.innerHeight-r.bottom-8;
            const dropH=290;
            if(spaceBelow>=dropH) setDropPos({top:r.bottom+4,left:r.left});
            else setDropPos({top:r.top-dropH-4,left:r.left});
          }
          setOpen(function(v){return !v;}); setPhase("hour");
        }}
        style={{...S.input,marginBottom:0,display:"flex",alignItems:"center",justifyContent:"space-between",
          cursor:"pointer",fontWeight:600,fontSize:14,color:"#1C1714",width:"100%",textAlign:"left",padding:"8px 12px"}}>
        <span>{displayVal()}</span>
        <span style={{fontSize:10,color:"#9B8E80"}}>{open?"▲":"▼"}</span>
      </button>
      {open&&ReactDOM.createPortal(
        <div ref={dropRef} style={{position:"fixed",top:dropPos.top,left:dropPos.left,zIndex:9999,background:"#FDFAF6",
          borderRadius:12,border:"1.5px solid #E3D9CC",boxShadow:"0 8px 28px rgba(0,0,0,0.18)",
          padding:"10px",width:220}}>
          {/* Controls row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>setPhase("hour")}
                style={{...S.btnMicro,background:phase==="hour"?"#1C1714":"#EBE4D8",color:phase==="hour"?"#F8F3EC":"#4A3F30",padding:"3px 10px",fontSize:11}}>Hr</button>
              <button onClick={()=>setPhase("minute")}
                style={{...S.btnMicro,background:phase==="minute"?"#1C1714":"#EBE4D8",color:phase==="minute"?"#F8F3EC":"#4A3F30",padding:"3px 10px",fontSize:11}}>Min</button>
            </div>
            <button onClick={toggle12}
              style={{...S.btnMicro,background:"#EBE4D8",color:"#4A3F30",padding:"3px 10px",fontSize:11}}>
              {use12?"12h":"24h"}
            </button>
          </div>
          {use12&&phase==="hour"&&(
            <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:6}}>
              <button onClick={()=>setAmPm(false)}
                style={{...S.btnMicro,background:curH<12?"#1C1714":"#EBE4D8",color:curH<12?"#F8F3EC":"#4A3F30",flex:1,padding:"4px 0"}}>AM</button>
              <button onClick={()=>setAmPm(true)}
                style={{...S.btnMicro,background:curH>=12?"#1C1714":"#EBE4D8",color:curH>=12?"#F8F3EC":"#4A3F30",flex:1,padding:"4px 0"}}>PM</button>
            </div>
          )}
          {phase==="hour"?<HourDial/>:<MinuteDial/>}
        </div>,
        document.body
      )}
    </div>
  );
}

// Fuzzy match: allows up to maxDist character edits (Levenshtein) between query and any substring of text
function fuzzyMatch(text, query, maxDist) {
  if (!text || !query) return false;
  const t = text.toLowerCase();
  const q = query.toLowerCase();
  if (t.includes(q)) return true;
  if (q.length <= 2 || q.length > 40) return false;
  // Sliding window: check substrings of text near query length
  const wMin = Math.max(1, q.length - maxDist);
  const wMax = q.length + maxDist;
  for (let wLen = wMin; wLen <= wMax; wLen++) {
    for (let i = 0; i <= t.length - wLen; i++) {
      const sub = t.slice(i, i + wLen);
      let dist = 0;
      const rows = q.length + 1;
      const cols = sub.length + 1;
      const d = new Array(rows);
      for (let r = 0; r < rows; r++) { d[r] = new Array(cols); d[r][0] = r; }
      for (let c = 0; c < cols; c++) d[0][c] = c;
      for (let r = 1; r < rows; r++) {
        for (let c = 1; c < cols; c++) {
          const cost = q[r - 1] === sub[c - 1] ? 0 : 1;
          d[r][c] = Math.min(d[r - 1][c] + 1, d[r][c - 1] + 1, d[r - 1][c - 1] + cost);
        }
      }
      dist = d[q.length][sub.length];
      if (dist <= maxDist) return true;
    }
  }
  return false;
}

function SearchModal({tasks,notes,sections,byId,tt,trackers,onClose,setView}) {
  const {navigateToFresh,navigateToDate}=React.useContext(NavCtx)||{};
  const [query,setQuery]=useState("");
  const [selIdx,setSelIdx]=useState(0);
  const [showArchived,setShowArchived]=useState(false);
  const inputRef=useRef(null);

  useEffect(()=>{ setTimeout(()=>inputRef.current?.focus(),50); },[]);
  useEffect(()=>{
    const handler=e=>{ if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[]);

  const q=query.trim();
  const qLow=q.toLowerCase();

  // Detect regex: query wrapped in /pattern/ or /pattern/flags
  let useRegex=false, regexObj=null;
  if (q.length>=3 && q[0]==="/") {
    const lastSlash=q.lastIndexOf("/");
    if (lastSlash>0) {
      const pattern=q.slice(1,lastSlash);
      const flags=q.slice(lastSlash+1);
      try { regexObj=new RegExp(pattern,flags.includes("i")?flags:flags+"i"); useRegex=true; }
      catch(e) { /* invalid regex, fall through to plain search */ }
    }
  }

  // Determine typo tolerance: 1 for short queries, 2 for longer
  const maxTypo = qLow.length <= 5 ? 1 : 2;

  function matches(text) {
    if (!q) return false;
    if (useRegex && regexObj) return regexObj.test(text || "");
    return fuzzyMatch(text, qLow, maxTypo);
  }

  // Search tasks
  const taskResults=q?tasks.filter(t=>
    t.type!=="spacer"&&
    (!t.archived||showArchived)&&
    (matches(t.title)||matches(t.notes))
  ).slice(0,12).map(t=>({
    kind:"task",id:t.id,title:t.title,
    section:byId[t.sectionId],
    detail:t.notes?t.notes.slice(0,80):null,
    status:t.status,archived:t.archived,
  })):[];

  // Search notes
  const allNotes=Object.entries(notes||{}).flatMap(function(entry){
    const sid=entry[0]; const arr=entry[1];
    return (Array.isArray(arr)?arr:[]).map(function(n){ return Object.assign({},n,{_sid:sid}); });
  });
  const noteResults=q?allNotes.filter(n=>
    matches(n.title)||matches(stripHtmlText(n.content))
  ).slice(0,12).map(n=>({
    kind:"note",id:n.id,title:n.title,
    section:byId[n._sid],
    detail:stripHtmlText(n.content).slice(0,80)||null,
  })):[];

  // Search blocks
  const blockResults=[];
  if(q){
    const entries=Object.entries(tt||{});
    for(let wi=0;wi<entries.length;wi++){
      const wk=entries[wi][0]; const weekData=entries[wi][1];
      const dayEntries=Object.entries(weekData||{});
      for(let di=0;di<dayEntries.length;di++){
        const day=dayEntries[di][0]; const arr=dayEntries[di][1];
        for(let bi=0;bi<(arr||[]).length;bi++){
          const blk=arr[bi];
          const sec=blk.sectionId?byId[blk.sectionId]:null;
          const blkLabel=blk.label||(sec?sec.label:"")||"";
          if(matches(blkLabel)){
            blockResults.push({
              kind:"block",id:blk.id,
              title:blkLabel||"Block",
              section:sec,
              detail:day+" "+blk.start+"--"+blk.end+" ("+weekLabel(wk)+")",
              week:wk,day:day,
            });
          }
        }
      }
    }
  }

  // Search trackers
  const trackerResults=q?(trackers||[]).filter(t=>
    !t.archived&&matches(t.title)
  ).slice(0,8).map(t=>({
    kind:"tracker",id:t.id,title:t.title,
    section:byId[t.sectionId],
    detail:DAYS.filter(function(_,i){return t.activeDays[i];}).map(function(d){return d.slice(0,3);}).join(", "),
  })):[];

  const results=[...taskResults,...noteResults,...trackerResults,...blockResults.slice(0,8)];
  useEffect(()=>{ setSelIdx(0); },[query,showArchived]);

  function handleClick(r){
    if(r.kind==="task") navigateToFresh?.({type:"task",id:r.id});
    else if(r.kind==="note") navigateToFresh?.({type:"note",id:r.id});
    else if(r.kind==="tracker"){ setView?.("trackers"); }
    else if(r.kind==="block"&&r.week&&r.day) navigateToDate?.(weekDayToISO(r.week,r.day));
    onClose();
  }

  function handleKeyDown(e){
    if(e.key==="ArrowDown"){ e.preventDefault(); setSelIdx(i=>Math.min(i+1,results.length-1)); }
    if(e.key==="ArrowUp"){ e.preventDefault(); setSelIdx(i=>Math.max(i-1,0)); }
    if(e.key==="Enter"&&results[selIdx]){ e.preventDefault(); handleClick(results[selIdx]); }
  }

  const TYPE_ICON={task:"&#x1F4CB;",note:"&#x1F4DD;",block:"&#x1F4C5;",tracker:"&#x1F4CA;"};
  const TYPE_LABEL={task:"Task",note:"Note",block:"Block",tracker:"Tracker"};
  const TYPE_COLOR={task:"#4B3FC7",note:"#6B3FC7",block:"#2A6FAD",tracker:"#0C7B7B"};

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(28,23,20,0.72)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:300,padding:"80px 20px 20px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#FDFAF6",borderRadius:16,width:"100%",maxWidth:580,boxShadow:"0 32px 80px rgba(0,0,0,0.48)",border:"1px solid #E3D9CC",overflow:"hidden",maxHeight:"calc(100vh - 120px)",display:"flex",flexDirection:"column"}}>

        {/* Search input */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 18px",borderBottom:"1px solid #EBE4D8"}}>
          <span style={{fontSize:18,flexShrink:0}}>&#x1F50D;</span>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={handleKeyDown}
            placeholder="Search tasks, notes, blocks..."
            style={{flex:1,border:"none",background:"transparent",fontSize:15,fontWeight:500,fontFamily:'"DM Sans",sans-serif',color:"#1C1714",outline:"none"}}/>
          <button onClick={()=>setShowArchived(v=>!v)} title={showArchived?"Hiding archived":"Showing archived"}
            style={{...S.btnMicro,background:showArchived?"#1C1714":"#EBE4D8",color:showArchived?"#F8F3EC":"#9B8E80",padding:"2px 8px",fontSize:10,flexShrink:0}}>
            {showArchived?"+ Archived":"No Archive"}
          </button>
          <span style={{fontSize:10,color:"#9B8E80",flexShrink:0,background:"#EBE4D8",padding:"2px 8px",borderRadius:4,fontWeight:600}}>Ctrl+K</span>
          <button onClick={onClose} style={{width:26,height:26,borderRadius:6,border:"none",background:"transparent",color:"#7A6C5E",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>&#xd7;</button>
        </div>

        {/* Results */}
        <div style={{overflowY:"auto",flex:1,padding:"6px 0"}}>
          {!q&&(
            <div style={{padding:"28px 20px",textAlign:"center",color:"#9B8E80"}}>
              <div style={{fontSize:11,fontWeight:600}}>Type to search across all tasks, notes, and timetable blocks</div>
              <div style={{fontSize:10,marginTop:6,color:"#B8ADA0"}}>Supports fuzzy matching. Use /pattern/ for regex.</div>
            </div>
          )}
          {q&&results.length===0&&(
            <div style={{padding:"28px 20px",textAlign:"center",color:"#9B8E80"}}>
              <div style={{fontSize:24,marginBottom:6}}>&#x1F50E;</div>
              <div style={{fontSize:13,fontWeight:600}}>No results for "{query}"</div>
            </div>
          )}
          {results.map(function(r,i){
            const sec=r.section;
            const selected=i===selIdx;
            return (
              <div key={r.kind+"-"+r.id+"-"+i} onClick={()=>handleClick(r)}
                onMouseEnter={()=>setSelIdx(i)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"9px 18px",cursor:"pointer",
                  background:selected?"#EBE4D8":"transparent",transition:"background 0.1s"}}>
                {/* Type badge */}
                <span style={{fontSize:10,fontWeight:700,color:TYPE_COLOR[r.kind],background:TYPE_COLOR[r.kind]+"18",
                  padding:"2px 8px",borderRadius:6,flexShrink:0,textTransform:"uppercase",letterSpacing:"0.3px"}}
                  dangerouslySetInnerHTML={{__html:TYPE_ICON[r.kind]+" "+TYPE_LABEL[r.kind]}}/>
                {/* Content */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#1C1714",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                    textDecoration:(r.status==="done"||r.archived)?"line-through":"none",
                    opacity:r.archived?0.6:1}}>
                    {r.title||"Untitled"}
                  </div>
                  {r.detail&&<div style={{fontSize:11,color:"#9B8E80",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{r.detail}</div>}
                </div>
                {/* Section badge */}
                {sec&&(
                  <span style={{fontSize:10,fontWeight:700,background:sec.color+"20",color:sec.color,
                    padding:"2px 8px",borderRadius:10,flexShrink:0,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {sec.label}
                  </span>
                )}
                {/* Status */}
                {r.archived&&<span style={{fontSize:9,fontWeight:700,color:"#9B8E80",background:"#EBE4D8",padding:"1px 6px",borderRadius:4,flexShrink:0}}>archived</span>}
                {r.status==="done"&&!r.archived&&<span style={{fontSize:9,fontWeight:700,color:"#1A7A43",background:"#D4F0E0",padding:"1px 6px",borderRadius:4,flexShrink:0}}>done</span>}
              </div>
            );
          })}
        </div>

        {/* Footer hint */}
        {results.length>0&&(
          <div style={{padding:"8px 18px",borderTop:"1px solid #EBE4D8",background:"#F3EDE3",display:"flex",gap:14,flexShrink:0}}>
            <span style={{fontSize:10,color:"#9B8E80"}}>&#x2191;&#x2193; navigate</span>
            <span style={{fontSize:10,color:"#9B8E80"}}>&#x23CE; open</span>
            <span style={{fontSize:10,color:"#9B8E80"}}>Esc close</span>
          </div>
        )}
      </div>
    </div>
  );
}

function ScheduleTaskModal({task,sections,byId,getDayBlocks,upsertBlock,onClose}) {
  const [day,   setDay]   = useState(todayName());
  const [start, setStart] = useState("09:00");
  const [end,   setEnd]   = useState("10:00");
  const [saved, setSaved] = useState(false);

  // Smart default: end of last block for chosen day
  useEffect(()=>{
    const blocks=getDayBlocks(day);
    if(blocks.length>0){
      const sorted=[...blocks].sort((a,b)=>a.start.localeCompare(b.start));
      const lastEnd=sorted[sorted.length-1].end;
      setStart(lastEnd);
      const [h,m]=lastEnd.split(":").map(Number);
      const endM=h*60+m+60;
      setEnd(`${String(Math.floor(endM/60)%24).padStart(2,"0")}:${String(endM%60).padStart(2,"0")}`);
    } else {
      setStart("09:00"); setEnd("10:00");
    }
  },[day]);

  function handleSave(){
    const blk={
      id:uid(),type:"section",sectionId:task.sectionId,
      label:task.title,start,end,
      linkedItems:[{type:"task",id:task.id,snapshot:task.title},
        ...(task.linkedNoteIds||[]).map(nid=>({type:"note",id:nid,snapshot:""}))],
    };
    upsertBlock(day,blk);
    setSaved(true);

  const sec=byId[task.sectionId]||{color:"#9B8E80",label:"?"};

            style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,border:"1.5px solid",

            {d.slice(0,3)}
          </button>
        ))}
      </div>

      <div style={{display:"flex",gap:14,marginBottom:20}}>

// ─── Upcoming Digest ──────────────────────────────────────────────────────────

function UpcomingDigest({tasks,byId,completeTask,updateTask}) {
  const today     = todayISO();
  const endWeek   = addDays(today,7);
  const endMonth  = addDays(today,31);

  // Only undone tasks with a dueDate
  const dated = tasks.filter(t=>t.dueDate&&t.status!=="done"&&t.type!=="spacer");
  if(dated.length===0) return null;

  const overdue   = dated.filter(t=>t.dueDate<=today).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const thisWeek  = dated.filter(t=>t.dueDate>today&&t.dueDate<=endWeek).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const thisMonth = dated.filter(t=>t.dueDate>endWeek&&t.dueDate<=endMonth).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));

  if(overdue.length+thisWeek.length+thisMonth.length===0) return null;

  function DueTask({task}) {
    const {navigateTo}=React.useContext(NavCtx)||{};
    const sec   = byId[task.sectionId]||{color:"#9B8E80",label:"?"};
    const due   = fmtDue(task.dueDate);
    return (
      <div className="upcoming-task" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:9,background:"#F8F3EC",border:"1px solid #E3D9CC",cursor:"default",transition:"background 0.12s"}}>
        <button onClick={()=>completeTask(task.id)} title="Mark done"
          style={{width:16,height:16,borderRadius:4,border:`2px solid ${sec.color}`,background:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:sec.color}}>✓</button>
        <span onClick={()=>navigateTo?.({type:"task",id:task.id})} style={{fontSize:12,flex:1,fontWeight:500,color:"#1C1714",cursor:"pointer"}}>{task.title}</span>
        <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:700,background:sec.color+"20",color:sec.color,flexShrink:0}}>{sec.label}</span>
        <span style={{fontSize:10,fontWeight:700,flexShrink:0,color:due.urgent?"#C43A3A":"#7A6C5E",background:due.urgent?"#FAE8E8":"#EBE4D8",padding:"2px 7px",borderRadius:10}}>{due.label}</span>
      </div>
    );
  }

  function Bucket({title,accentColor,tasks}) {
    if(tasks.length===0) return null;
    return (
      <div>
        <div style={{fontSize:10,fontWeight:700,color:accentColor,letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:7,display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:accentColor,flexShrink:0}}/>
          {title} <span style={{fontWeight:400,color:"#9B8E80",textTransform:"none",letterSpacing:0}}>({tasks.length})</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {tasks.map(t=><DueTask key={t.id} task={t}/>)}
        </div>
      </div>
    );
  }

  return (
    <div style={{background:"#EBE4D8",borderRadius:14,padding:"16px 18px",marginBottom:24,border:"1px solid #D6CEC3"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <span style={{fontSize:15}}>📅</span>
        <span style={{fontFamily:'"Playfair Display",serif',fontSize:15,fontWeight:700}}>Upcoming</span>
        <span style={{fontSize:11,color:"#9B8E80",marginLeft:4}}>{dated.length} time-sensitive task{dated.length!==1?"s":""}</span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <Bucket title="Overdue & Today" accentColor="#C43A3A" tasks={overdue}/>
        <Bucket title="This Week"       accentColor="#4B3FC7" tasks={thisWeek}/>
        <Bucket title="Within a Month"  accentColor="#1A7A43" tasks={thisMonth}/>
      </div>
    </div>
  );
}
