<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Progress You — Notebook System</title>
  <script>
    // Resilient script loader: tries local vendor/ first, falls back to CDN in dev
    function loadScript(localPath, cdnUrl) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = localPath;
        s.onload = resolve;
        s.onerror = function() {
          console.warn('Local load failed for ' + localPath + ', trying CDN fallback…');
          var c = document.createElement('script');
          c.src = cdnUrl;
          c.onload = resolve;
          c.onerror = function() {
            reject(new Error('Failed to load: ' + localPath + ' (and CDN fallback)'));
          };
          document.head.appendChild(c);
        };
        document.head.appendChild(s);
      });
    }

    var APP_MODULES = [
      './app/01-core.jsx',
      './app/02-shared.jsx',
      './app/03-modals.jsx',
      './app/04-views.jsx',
      './app/05-overlays.jsx',
      './app/06-app.jsx'
    ];

    (async function() {
      try {
        await loadScript('./vendor/react.production.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js');
        await loadScript('./vendor/react-dom.production.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js');
        await loadScript('./vendor/babel.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js');

        // Fetch all app modules and concatenate
        var sources = await Promise.all(APP_MODULES.map(function(path) {
          return fetch(path).then(function(r) {
            if (!r.ok) throw new Error('Failed to fetch ' + path + ': ' + r.status);
            return r.text();
          });
        }));
        var appSource = sources.join('\n\n');

        if (window.Babel) {
          var code = window.Babel.transform(appSource, { presets: ['env', 'react'] }).code;
          var run = document.createElement('script');
          run.textContent = code;
          document.body.appendChild(run);
        }
      } catch(e) {
        document.getElementById('root').innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:40px">' +
          '<div style="text-align:center;max-width:480px">' +
          '<div style="font-size:36px;margin-bottom:14px">&#x26A0;</div>' +
          '<h1 style="font-size:20px;margin-bottom:10px">Failed to load application</h1>' +
          '<p style="color:#666;line-height:1.6;margin-bottom:16px">Make sure the <code>src/vendor/</code> and <code>src/app/</code> folders exist with the required files.</p>' +
          '<pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:11px;text-align:left;overflow:auto">' + e.message + '</pre>' +
          '</div></div>';
      }
    })();
  </script>
  <style>html,body{margin:0;padding:0;background:#F8F3EC;}#root{min-height:100vh;}</style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
