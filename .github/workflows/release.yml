name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', '' -replace '(\d)([a-zA-Z])', '$1-$2'
          (Get-Content src-tauri\Cargo.toml) `
            -replace '^version = ".*"', "version = `"$version`"" |
            Set-Content src-tauri\Cargo.toml
          Write-Host "Version set to $version"

      - name: Read release notes
        id: notes
        shell: pwsh
        run: |
          $notes = if (Test-Path RELEASE_NOTES.md) { Get-Content RELEASE_NOTES.md -Raw } else { "" }
          $delimiter = "EOF_NOTES_" + (New-Guid).ToString("N")
          echo "body<<$delimiter" >> $env:GITHUB_OUTPUT
          echo $notes >> $env:GITHUB_OUTPUT
          echo $delimiter >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Progress You ${{ github.ref_name }}"
          releaseBody: "${{ steps.notes.outputs.body }}"
          releaseDraft: true
          includeUpdaterJson: true
          tauriScript: npm run tauri